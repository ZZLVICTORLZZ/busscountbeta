<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount MX - Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --green: #4CAF50; --text: #fff; --dim: #b0b0b0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; box-sizing: border-box; }
        
        /* Pantallas */
        .screen { display: none; flex-direction: column; height: 95vh; }
        .active { display: flex; }

        /* Encabezado */
        .header { text-align: center; margin-bottom: 15px; }
        .vuelta-info { font-size: 14px; color: var(--dim); }
        .destino { font-size: 24px; font-weight: bold; color: var(--green); margin: 5px 0; }
        #total-maestro { font-size: 70px; font-weight: 900; margin: 0; }

        /* Filas de Entrada */
        .rows { display: flex; flex-direction: column; gap: 10px; }
        .row { background: var(--card); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .row:focus-within { border-color: var(--green); }
        input { background: #fff; border: none; border-radius: 5px; width: 70px; padding: 8px; font-size: 20px; font-weight: bold; text-align: center; }

        /* Libro de Ruta */
        .libro-row { background: #252525; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 14px; }
        .total-dia-box { background: var(--green); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; }

        /* Botones */
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-green { background: var(--green); color: white; width: 100%; margin-top: 15px; }
        .btn-nav { background: #444; color: white; padding: 8px 15px; font-size: 12px; }
        .footer-nav { margin-top: auto; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="screen-registro" class="screen active">
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-nav" onclick="irALibro()">📖 LIBRO</button>
            <button class="btn-nav" style="background:#d32f2f" onclick="resetTodo()">⚠️ RESET DÍA</button>
        </div>
        
        <div class="header">
            <div id="txt-num-vuelta" class="vuelta-info">1ª MEDIA VUELTA</div>
            <div id="txt-destino" class="destino">INDIOS VERDES</div>
            <h1 id="total-maestro">0</h1>
            <div style="font-size:12px; color:var(--dim)">PASAJEROS EN ESTA VUELTA</div>
        </div>

        <div class="rows">
            <div class="row"><div>LOCAL<br><small>$14</small></div><input type="number" id="in-1" oninput="save()"></div>
            <div class="row"><div>ESTÁNDAR<br><small>$55</small></div><input type="number" id="in-2" oninput="save()"></div>
            <div class="row"><div>ESTUDIANTE<br><small>$47</small></div><input type="number" id="in-3" oninput="save()"></div>
            <div class="row"><div>INAPAM<br><small>$37</small></div><input type="number" id="in-4" oninput="save()"></div>
        </div>

        <button class="btn btn-green" onclick="finalizarVuelta()">Finalizar Media Vuelta</button>
    </div>

    <div id="screen-libro" class="screen">
        <button class="btn-nav" onclick="irARegistro()">⬅️ VOLVER A COBRAR</button>
        <h2 style="text-align:center">Resumen Diario</h2>
        <div id="lista-vueltas"></div>
        
        <div class="total-dia-box">
            <div style="font-size:12px">GRAN TOTAL DEL DÍA</div>
            <div id="resumen-final" style="font-size:20px; font-weight:bold">0 Pasajeros | $0.00</div>
        </div>
    </div>

    <script>
        let vueltaActual = 1;
        let historial = JSON.parse(localStorage.getItem('bus_historial')) || [];

        function save() {
            const vals = [
                parseInt(document.getElementById('in-1').value) || 0,
                parseInt(document.getElementById('in-2').value) || 0,
                parseInt(document.getElementById('in-3').value) || 0,
                parseInt(document.getElementById('in-4').value) || 0
            ];
            const total = vals.reduce((a, b) => a + b, 0);
            document.getElementById('total-maestro').innerText = total;
            
            // Guardar progreso temporal de la vuelta actual
            localStorage.setItem('temp_vuelta', JSON.stringify(vals));
        }

        function finalizarVuelta() {
            if(vueltaActual > 6) return alert("Día completado");

            const vals = JSON.parse(localStorage.getItem('temp_vuelta')) || [0,0,0,0];
            const dinero = (vals[0]*14) + (vals[1]*55) + (vals[2]*47) + (vals[3]*37);
            const totalPax = vals.reduce((a, b) => a + b, 0);

            historial.push({
                num: vueltaActual,
                destino: vueltaActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE",
                pax: totalPax,
                dinero: dinero
            });

            localStorage.setItem('bus_historial', JSON.stringify(historial));
            vueltaActual++;
            localStorage.setItem('v_actual', vueltaActual);
            
            // Limpiar inputs
            document.querySelectorAll('input').forEach(i => i.value = "");
            localStorage.removeItem('temp_vuelta');
            
            actualizarUI();
            irALibro();
        }

        function actualizarUI() {
            document.getElementById('txt-num-vuelta').innerText = ${vueltaActual}ª MEDIA VUELTA;
            document.getElementById('txt-destino').innerText = vueltaActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE";
            document.getElementById('total-maestro').innerText = "0";

            let html = "";
            let totalDíaPax = 0;
            let totalDíaDinero = 0;

            historial.forEach(v => {
                html += `<div class="libro-row">
                    <span><b>${v.num}ª</b> ${v.destino}</span>
                    <span>${v.pax} pax | $${v.dinero}</span>
                </div>`;
                totalDíaPax += v.pax;
                totalDíaDinero += v.dinero;
            });

            document.getElementById('lista-vueltas').innerHTML = html;
            document.getElementById('resumen-final').innerText = ${totalDíaPax} Pasajeros | $${totalDíaDinero.toLocaleString()} MXN;
        }

        function irALibro() {
            document.getElementById('screen-registro').classList.remove('active');
            document.getElementById('screen-libro').classList.add('active');
            actualizarUI();
        }

        function irARegistro() {
            document.getElementById('screen-libro').classList.remove('active');
            document.getElementById('screen-registro').classList.add('active');
        }

        function resetTodo() {
            if(confirm("¿Seguro que quieres borrar todo el día?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Cargar datos al iniciar
        window.onload = () => {
            vueltaActual = parseInt(localStorage.getItem('v_actual')) || 1;
            const temp = JSON.parse(localStorage.getItem('temp_vuelta'));
            if(temp) {
                document.getElementById('in-1').value = temp[0] || "";
                document.getElementById('in-2').value = temp[1] || "";
                document.getElementById('in-3').value = temp[2] || "";
                document.getElementById('in-4').value = temp[3] || "";
                save();
            }
            actualizarUI();
        };
    </script>
</body>
</html>
