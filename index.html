<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Línea Turquesa - Apolo 11</title>
    <style>
        :root { 
            --fondo: #F8E9D2;       
            --tarjeta: #EFEBE1;     
            --input_bg: #E6E0D4;    
            --texto: #4A4A4A;       
            --turquesa: #1ABC9C;    
            --gris_oscuro: #555555;
            --borde_lineas: #DCD5C6; 
        }

        body { background: var(--fondo); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        .tarjeta { background: var(--tarjeta); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* ESTILO DE ENTRADA CON VALIDACIÓN VISUAL */
        input[type="number"] { 
            background: var(--input_bg); 
            color: var(--texto); 
            border: 2px solid var(--turquesa); 
            padding: 12px; 
            width: 80px; 
            font-size: 1.6rem; 
            text-align: center; 
            border-radius: 10px; 
            font-weight: bold;
            outline: none;
        }

        input[type="number"]:focus { border-color: #16A085; background: #fff; }

        .etiqueta-boleto { color: var(--turquesa); font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 5px; }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: var(--fondo); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999; 
        }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="splash-screen">
        <svg viewBox="0 0 200 120" width="180">
            <path d="M40 80 Q 100 20 180 60" fill="none" stroke="#1ABC9C" stroke-width="12" stroke-linecap="round"/>
            <path d="M30 90 Q 90 30 170 70" fill="none" stroke="#555" stroke-width="8" stroke-linecap="round"/>
            <path d="M50 70 L110 60 M115 62 L55 72 M80 65 Q 90 40 100 62" stroke="#000" stroke-width="4" fill="black"/>
            <circle cx="100" cy="55" r="4" fill="black"/>
        </svg>
        <div style="font-size: 1.6rem; font-weight: bold; color: var(--gris_oscuro); margin-top: 10px;">LÍNEA TURQUESA</div>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: var(--gris_oscuro); opacity: 0.7;">PROYECTO APOLO 11 V 1.0</div>
    </div>

    <div id="p-reg" class="activa">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom: 20px;">REGISTRO DE PASAJEROS</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <span class="etiqueta-boleto">$14</span>
                    <input type="number" id="bol14" oninput="validarCifras(this); sumar();" placeholder="0">
                </div>
                <div>
                    <span class="etiqueta-boleto">$55</span>
                    <input type="number" id="bol55" oninput="validarCifras(this); sumar();" placeholder="0">
                </div>
                <div>
                    <span class="etiqueta-boleto">$47</span>
                    <input type="number" id="bol47" oninput="validarCifras(this); sumar();" placeholder="0">
                </div>
                <div>
                    <span class="etiqueta-boleto">$37</span>
                    <input type="number" id="bol37" oninput="validarCifras(this); sumar();" placeholder="0">
                </div>
            </div>

            <div style="margin-top: 25px; border-top: 2px solid var(--borde_lineas); padding-top: 15px;">
                <span style="font-size: 1.2rem; color: var(--gris_oscuro);">Total Vuelta:</span>
                <div id="total-vuelta" style="font-size: 2.5rem; font-weight: bold; color: var(--turquesa);">$0</div>
            </div>
        </div>
    </div>

    <script>
        function iniciarApp() { 
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2000);
        }

        // FUNCIÓN CLAVE: Bloquea entradas de más de 2 cifras
        function validarCifras(input) {
            if (input.value.length > 2) {
                input.value = input.value.slice(0, 2); 
            }
        }

        function sumar() {
            const v14 = (parseInt(document.getElementById('bol14').value) || 0) * 14;
            const v55 = (parseInt(document.getElementById('bol55').value) || 0) * 55;
            const v47 = (parseInt(document.getElementById('bol47').value) || 0) * 47;
            const v37 = (parseInt(document.getElementById('bol37').value) || 0) * 37;
            document.getElementById('total-vuelta').innerText = "$" + (v14 + v55 + v47 + v37);
        }
    </script>
</body>
</html>
