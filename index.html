<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount BETA - v9.2</title>
    <style>
        :root { 
            /* MODO CLARO (CHAMPAÑA Y PASTEL) */
            --fondo: #F8E9D2;       
            --tarjeta: #EFEBE1;     
            --input_bg: #E6E0D4;    
            --texto: #4A4A4A;       
            --texto_claro: #888888; 
            
            --turquesa: #5FA8A3;    
            --btn_turquesa: #A2D5D2;
            
            --verde_balance: #62A871;
            --verde_btn: #A8DAB5;   
            
            --rojo_suave: #E38888;  
            --rojo_btn: #FFB7B2;    
            
            --naranja: #E67E22;     
            --borde_lineas: #DCD5C6; 
        }

        /* MODO OSCURO */
        [data-theme="dark"] {
            --fondo: #121212;
            --tarjeta: #1E1E1E;
            --input_bg: #2C2C2C;
            --texto: #E0E0E0;
            --texto_claro: #A0A0A0;
            --borde_lineas: #333333;
            
            --turquesa: #00acc1;
            --btn_turquesa: #006064;
            --verde_balance: #66bb6a;
            --verde_btn: #2e7d32;
            --rojo_suave: #e57373;
            --rojo_btn: #c62828;
            --naranja: #ff9800;
        }
        
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; transition: background 0.3s, color 0.3s; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        
        .tarjeta { background: var(--tarjeta); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: background 0.3s; }
        
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; color: var(--texto); transition: background 0.3s; }
        .btn-turquesa { background: var(--btn_turquesa); }
        .btn-wa { background: var(--verde_btn); }
        .btn-verde { background: var(--verde_btn); }
        .btn-rojo { background: var(--rojo_btn); }
        .btn-gris { background: var(--borde_lineas); } 
        
        .btn-calculo { background: transparent; border: 2px solid var(--naranja); color: var(--naranja); }

        .opcion-chequeo { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--borde_lineas); }
        .opcion-chequeo label { font-size: 0.8rem; font-weight: bold; color: var(--texto); flex: 1; text-align: left; }
        .check-box { width: 18px; height: 18px; accent-color: var(--turquesa); margin-right: 12px; }
        
        .input-variable { width: 70px !important; background: var(--input_bg); border: 1px solid var(--turquesa); color: var(--texto); padding: 6px !important; border-radius: 6px; text-align: right !important; font-weight: bold; font-size: 1rem !important; transition: background 0.3s, color 0.3s; }
        .input-rojo { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; }

        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--turquesa); margin: 5px 0; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cuadricula label { color: var(--turquesa); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        
        input[type="number"], input[type="text"] { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 12px; width: 85%; font-size: 1.5rem; text-align: center; border-radius: 8px; font-weight: bold; transition: background 0.3s, color 0.3s; }
        
        select { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top:10px; font-weight: bold; transition: background 0.3s, color 0.3s; }

        .gasto-fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid var(--borde_lineas); padding-bottom: 4px; }
        .gasto-fila label { color: var(--rojo_suave); font-size: 0.8rem; font-weight: bold; text-align: left; flex: 1; }
        .input-gasto { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; font-size: 1.1rem !important; padding: 6px !important; width: 85px !important; text-align: right !important; margin: 0 !important; }
        
        .fila-historial { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--borde_lineas); font-size: 0.9rem; align-items: center; }
        .monto-texto { font-weight: bold; color: var(--turquesa); }

        #contenedor-avisos { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; pointer-events: none; }
        .aviso { background: var(--verde_btn); color: var(--texto); padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 1; transition: opacity 0.5s ease; text-align: center; border: 1px solid var(--verde_balance); }

        #pantalla-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* BARRA SUPERIOR PARA EL TEMA */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--btn_turquesa); color: var(--texto); font-size: 0.8rem; font-weight: bold; padding: 8px 15px; border-radius: 8px; margin-bottom: 10px; transition: background 0.3s; }
        .toggle-tema { font-size: 1.5rem; cursor: pointer; user-select: none; }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="pantalla-cierre">
        <div style="color: var(--rojo_suave); font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px;">CIERRE</div>
        <div id="cierre-vuelta" style="color: var(--turquesa); font-size: 2.5rem; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;"></div>
        <div id="cierre-dir" style="color: var(--texto_claro); font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 30px; text-transform: uppercase;"></div>
        <div id="cierre-monto" style="color: var(--verde_balance); font-size: 5rem; font-weight: bold;"></div>
    </div>

    <div id="contenedor-avisos"></div>

    <div class="top-bar">
        <span>MODO BETA v9.2</span>
        <span class="toggle-tema" id="icono-tema" onclick="cambiarTema()">🌙</span>
    </div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="destino">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="total-vuelta">0</span></div>
        </div>
        <div class="tarjeta">
            <div class="cuadricula">
                <div><label>$14</label><input type="number" id="bol14" oninput="sumar()"></div>
                <div><label>$55</label><input type="number" id="bol55" oninput="sumar()"></div>
                <div><label>$47</label><input type="number" id="bol47" oninput="sumar()"></div>
                <div><label>$37</label><input type="number" id="bol37" oninput="sumar()"></div>
            </div>
            <div style="margin-top:10px; border-top: 1px solid var(--borde_lineas); padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">CORTESÍAS</label>
                <input type="text" id="nombre-cortesia" placeholder="NOMBRE" style="width: 80%; font-size: 1.2rem; margin-top: 5px;">
                <button class="btn btn-verde" style="padding: 10px;" onclick="agregarCortesia()">+ AGREGAR CORTESÍA</button>
            </div>
            <div style="margin-top:10px; border-top: 1px solid var(--borde_lineas); padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">EXTRA</label>
                <div class="cuadricula" style="margin-top:5px;">
                    <input type="number" id="extra-precio" placeholder="$">
                    <input type="number" id="extra-cantidad" placeholder="#">
                </div>
                <button class="btn btn-verde" style="padding: 10px;" onclick="agregarExtra()">+ AGREGAR EXTRA</button>
            </div>
        </div>
        <button class="btn btn-turquesa" onclick="finalizarVuelta()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.8rem; text-transform: uppercase;">BALANCE</h2>
            <div style="color:var(--texto_claro); font-size:0.9rem;">Total Bruto: $<span id="bruto-total">0</span></div>
            <div style="color:var(--rojo_suave); font-size:0.9rem; margin-top: 5px; font-weight: bold;">Gastos Ruta: -$<span id="gastos-etiqueta">0</span></div>
            <hr style="border: 0.5px solid var(--borde_lineas); margin: 8px 0;">
            <div style="color:var(--verde_balance); font-size:1rem; font-weight: bold; text-transform: uppercase;">Total de Cuenta</div>
            <div id="neto-total" style="font-size: 2.5rem; color:var(--verde_balance); font-weight:bold;">$0</div>
        </div>

        <div id="lista-vueltas" class="tarjeta" style="padding:0; text-align:left; max-height: 120px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--rojo_suave); margin: 0 0 10px 0; font-size: 0.9rem;">GASTOS DE RUTA</h3>
            <div class="gasto-fila"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="actualizarBalance()" placeholder="0"></div>
            <button class="btn btn-calculo" onclick="irA('p-calc')">CALCULAR EFECTIVO ENTREGAR</button>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ REPORTE GENERAL WHATSAPP</button>
        <button class="btn btn-rojo" onclick="borrarTodo()">BORRAR TODO</button>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin:0; font-size: 1.1rem; text-transform: uppercase;">Liquidación Final</h2>
        </div>

        <div class="tarjeta">
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-mut" onchange="recalcularLiquidacion()"><label>MUTUALIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-seg" onchange="recalcularLiquidacion()"><label>SEGURIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-opd" onchange="recalcularLiquidacion()"><label>OPERACIÓN DIESEL ($50)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-pen" onchange="recalcularLiquidacion()"><label>PENSIÓN / COBRO ($40)</label></div>
            
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-fia" onchange="recalcularLiquidacion()"><label>FIANZA</label><input type="number" class="input-variable" id="v-fia" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-bas" onchange="recalcularLiquidacion()"><label>BASES</label><input type="number" class="input-variable" id="v-bas" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-tag" onchange="recalcularLiquidacion()"><label>TAG</label><input type="number" class="input-variable" id="v-tag" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-vdi" onchange="recalcularLiquidacion()"><label>VALE DIESEL</label><input type="number" class="input-variable" id="v-vdi" oninput="recalcularLiquidacion()" placeholder="0"></div>
            
            <div class="opcion-chequeo" style="border-top: 1px solid var(--borde_lineas); margin-top: 5px; padding-top: 5px;">
                <input type="checkbox" class="check-box" id="c-bol" onchange="recalcularLiquidacion()">
                <label style="color:var(--rojo_suave)">TOTAL EN BOLETOS</label>
                <input type="number" class="input-variable input-rojo" id="v-bol" oninput="recalcularLiquidacion()" placeholder="0">
            </div>
        </div>

        <div class="tarjeta">
            <div style="color:var(--verde_balance); font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">Efectivo Entregar</div>
            <div id="final-entrega" style="font-size: 3.5rem; color:var(--verde_balance); font-weight:bold; margin-top: 5px;">$0</div>
        </div>

        <button class="btn btn-wa" style="margin-bottom: 10px;" onclick="enviarWhatsAppLiquidacion()">✅ ENVIAR CORTE A RECAUDACIÓN</button>

        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL BALANCE</button>
    </div>

    <script>
        var nVuelta = parseInt(localStorage.getItem('b_nv')) || 1;
        var historial = JSON.parse(localStorage.getItem('b_hist')) || [];
        var listaExtras = [], listaCortesias = [], brutoGlobal = 0, netoRuta = 0;

        function iniciarApp() { 
            // Cargar el tema guardado
            var temaGuardado = localStorage.getItem('b_theme');
            if(temaGuardado === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('icono-tema').innerText = '☀️';
            }
            dibujarHistorial(); 
        }

        // FUNCIÓN PARA EL MODO OSCURO
        function cambiarTema() {
            var actual = document.body.getAttribute('data-theme');
            if (actual === 'dark') {
                document.body.removeAttribute('data-theme');
                document.getElementById('icono-tema').innerText = '🌙';
                localStorage.setItem('b_theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('icono-tema').innerText = '☀️';
                localStorage.setItem('b_theme', 'dark');
            }
        }

        function mostrarAviso(texto) {
            var contenedor = document.getElementById('contenedor-avisos');
            var aviso = document.createElement('div');
            aviso.className = 'aviso';
            aviso.innerText = texto;
            contenedor.appendChild(aviso);
            setTimeout(function() { aviso.style.opacity = '0'; }, 2500);
            setTimeout(function() { contenedor.removeChild(aviso); }, 3000);
        }

        function sumar() {
            var f = (parseInt(document.getElementById('bol14').value) || 0) * 14 + 
                    (parseInt(document.getElementById('bol55').value) || 0) * 55 + 
                    (parseInt(document.getElementById('bol47').value) || 0) * 47 + 
                    (parseInt(document.getElementById('bol37').value) || 0) * 37;
            var e = 0; listaExtras.forEach(function(x){ e += (x.p * x.c); });
            document.getElementById('total-vuelta').innerText = (f + e);
        }

        function agregarExtra() {
            var p = parseFloat(document.getElementById('extra-precio').value) || 0;
            var c = parseInt(document.getElementById('extra-cantidad').value) || 0;
            if (p > 0 && c > 0) { 
                listaExtras.push({p: p, c: c}); 
                sumar(); 
                var msj = c === 1 ? "Se agregó 1 pasajero de $" + p : "Se agregaron " + c + " pasajeros de $" + p;
                mostrarAviso(msj);
                document.getElementById('extra-precio').value = ""; document.getElementById('extra-cantidad').value = ""; 
            }
        }

        function agregarCortesia() {
            var n = document.getElementById('nombre-cortesia').value.trim();
            if (n !== "") { 
                var nomMayus = n.toUpperCase();
                listaCortesias.push(nomMayus); 
                mostrarAviso("Se agregó la cortesía " + nomMayus);
                document.getElementById('nombre-cortesia').value = ""; 
            }
        }

        function finalizarVuelta() {
            var m = parseInt(document.getElementById('total-vuelta').innerText) || 0;
            var d = document.getElementById('destino').value;
            
            var b14 = parseInt(document.getElementById('bol14').value) || 0;
            var b55 = parseInt(document.getElementById('bol55').value) || 0;
            var b47 = parseInt(document.getElementById('bol47').value) || 0;
            var b37 = parseInt(document.getElementById('bol37').value) || 0;
            
            var tPas = b14 + b55 + b47 + b37 + listaCortesias.length;
            listaExtras.forEach(function(e) { tPas += e.c; });
            
            if (m === 0 && tPas === 0) {
                if (!confirm("¿Está seguro de cerrar esta vuelta vacía?")) return;
            }

            document.getElementById('cierre-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            document.getElementById('cierre-dir').innerText = d;
            document.getElementById('cierre-monto').innerText = "$" + m;
            document.getElementById('pantalla-cierre').style.display = 'flex';
            
            historial.push({ n: nVuelta, d: d, m: m, p: tPas, det: { b14: b14, b55: b55, b47: b47, b37: b37, ext: [...listaExtras], cor: [...listaCortesias] } });
            localStorage.setItem('b_hist', JSON.stringify(historial));
            nVuelta++; localStorage.setItem('b_nv', nVuelta);
            
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            listaExtras = []; 
            listaCortesias = []; 
            sumar(); 

            setTimeout(function() {
                document.getElementById('pantalla-cierre').style.display = 'none';
                irA('p-lib');
            }, 2000);
        }

        function actualizarBalance() {
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + (parseFloat(document.getElementById('g-caseta').value) || 0) + (parseFloat(document.getElementById('g-despachadores').value) || 0) + (parseFloat(document.getElementById('g-pension').value) || 0) + (parseFloat(document.getElementById('g-sueldo').value) || 0);
            netoRuta = brutoGlobal - g;
            document.getElementById('gastos-etiqueta').innerText = g;
            document.getElementById('neto-total').innerText = "$" + netoRuta;
            recalcularLiquidacion();
        }

        function recalcularLiquidacion() {
            var ajuste = 0;
            if(document.getElementById('c-mut').checked) ajuste += 20;
            if(document.getElementById('c-seg').checked) ajuste += 20;
            if(document.getElementById('c-opd').checked) ajuste += 50;
            if(document.getElementById('c-pen').checked) ajuste += 40;
            if(document.getElementById('c-fia').checked) ajuste += (parseFloat(document.getElementById('v-fia').value) || 0);
            if(document.getElementById('c-bas').checked) ajuste += (parseFloat(document.getElementById('v-bas').value) || 0);
            if(document.getElementById('c-tag').checked) ajuste += (parseFloat(document.getElementById('v-tag').value) || 0);
            if(document.getElementById('c-vdi').checked) ajuste += (parseFloat(document.getElementById('v-vdi').value) || 0);
            
            var restaBoletos = 0;
            if(document.getElementById('c-bol').checked) restaBoletos = (parseFloat(document.getElementById('v-bol').value) || 0);
            
            document.getElementById('final-entrega').innerText = "$" + (netoRuta + ajuste - restaBoletos);
        }

        function dibujarHistorial() {
            document.getElementById('titulo-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            var h = ""; brutoGlobal = 0;
            historial.forEach(function(v) {
                h += '<div class="fila-historial"><span><b>' + v.n + 'ª</b> ' + v.d + '</span><span class="monto-texto">' + v.p + ' pasajeros - $' + v.m + '</span></div>';
                brutoGlobal += v.m;
            });
            document.getElementById('lista-vueltas').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin vueltas</p>";
            document.getElementById('bruto-total').innerText = brutoGlobal;
            actualizarBalance();
        }

        function irA(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-lib') dibujarHistorial();
        }

        function borrarTodo() { if (confirm("¿Borrar todo el día?")) { localStorage.clear(); location.reload(); } }

        // WHATSAPP 1: REPORTE GENERAL
        function enviarWhatsApp() {
            if (historial.length === 0) return alert("No hay datos registrados.");
            
            var d_diesel = parseFloat(document.getElementById('g-diesel').value) || 0;
            var d_caseta = parseFloat(document.getElementById('g-caseta').value) || 0;
            var d_desp = parseFloat(document.getElementById('g-despachadores').value) || 0;
            var d_pen = parseFloat(document.getElementById('g-pension').value) || 0;
            var d_sue = parseFloat(document.getElementById('g-sueldo').value) || 0;
            var totalGastos = d_diesel + d_caseta + d_desp + d_pen + d_sue;

            var mensaje = "*REPORTE DE CUENTA COMPLETO*%0A";
            mensaje += "----------------------------%0A";
            
            historial.forEach(function(v) {
                mensaje += "*"+ v.n + "ª " + v.d + "*%0A";
                if(v.det.b14 > 0) mensaje += "• " + v.det.b14 + " de $14%0A";
                if(v.det.b55 > 0) mensaje += "• " + v.det.b55 + " de $55%0A";
                if(v.det.b47 > 0) mensaje += "• " + v.det.b47 + " de $47%0A";
                if(v.det.b37 > 0) mensaje += "• " + v.det.b37 + " de $37%0A";
                if(v.det.ext && v.det.ext.length > 0) {
                    v.det.ext.forEach(function(e) { mensaje += "• " + e.c + " de $" + e.p + " (Extra)%0A"; });
                }
                if(v.det.cor && v.det.cor.length > 0) {
                    v.det.cor.forEach(function(c) { mensaje += "• Cortesía: " + c + "%0A"; });
                }
                mensaje += "Pasajeros: " + v.p + " | Subtotal: $" + v.m + "%0A%0A";
            });
            
            if (totalGastos > 0) {
                mensaje += "----------------------------%0A";
                mensaje += "*GASTOS DE RUTA*%0A";
                if(d_diesel > 0) mensaje += "• Diesel: $" + d_diesel + "%0A";
                if(d_caseta > 0) mensaje += "• Caseta: $" + d_caseta + "%0A";
                if(d_desp > 0) mensaje += "• Despachadores: $" + d_desp + "%0A";
                if(d_pen > 0) mensaje += "• Pensión: $" + d_pen + "%0A";
                if(d_sue > 0) mensaje += "• Sueldo: $" + d_sue + "%0A";
            }
            
            var totalCuenta = brutoGlobal - totalGastos;
            
            mensaje += "----------------------------%0A";
            mensaje += "*BALANCE FINAL*%0A";
            mensaje += "TOTAL EN BRUTO: $" + brutoGlobal + "%0A";
            mensaje += "TOTAL DE GASTOS: -$" + totalGastos + "%0A";
            mensaje += "----------------------------%0A";
            mensaje += "*TOTAL DE CUENTA: $" + totalCuenta + "*";
            
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }

        // WHATSAPP 2: CORTE DE CAJA EXCLUSIVO
        function enviarWhatsAppLiquidacion() {
            var ajuste = 0;
            var mensaje = "*CORTE DE CAJA - RECAUDACIÓN*%0A";
            mensaje += "----------------------------%0A";
            mensaje += "Balance de Ruta: *$" + netoRuta + "*%0A";
            mensaje += "----------------------------%0A";
            
            // Sumas
            if(document.getElementById('c-mut').checked) { ajuste += 20; mensaje += "• Mutualidad: +$20%0A"; }
            if(document.getElementById('c-seg').checked) { ajuste += 20; mensaje += "• Seguridad: +$20%0A"; }
            if(document.getElementById('c-opd').checked) { ajuste += 50; mensaje += "• Operación Diesel: +$50%0A"; }
            if(document.getElementById('c-pen').checked) { ajuste += 40; mensaje += "• Pensión/Cobro: +$40%0A"; }
            
            var fia = parseFloat(document.getElementById('v-fia').value) || 0;
            if(document.getElementById('c-fia').checked && fia > 0) { ajuste += fia; mensaje += "• Fianza: +$" + fia + "%0A"; }
            
            var bas = parseFloat(document.getElementById('v-bas').value) || 0;
            if(document.getElementById('c-bas').checked && bas > 0) { ajuste += bas; mensaje += "• Bases: +$" + bas + "%0A"; }
            
            var tag = parseFloat(document.getElementById('v-tag').value) || 0;
            if(document.getElementById('c-tag').checked && tag > 0) { ajuste += tag; mensaje += "• TAG: +$" + tag + "%0A"; }
            
            var vdi = parseFloat(document.getElementById('v-vdi').value) || 0;
            if(document.getElementById('c-vdi').checked && vdi > 0) { ajuste += vdi; mensaje += "• Vale Diesel: +$" + vdi + "%0A"; }
            
            // Restas
            var restaBoletos = 0;
            var bol = parseFloat(document.getElementById('v-bol').value) || 0;
            if(document.getElementById('c-bol').checked && bol > 0) { 
                restaBoletos = bol; 
                mensaje += "----------------------------%0A";
                mensaje += "• Boletos entregados: -$" + bol + "%0A"; 
            }
            
            var entregar = netoRuta + ajuste - restaBoletos;
            
            mensaje += "----------------------------%0A";
            mensaje += "*EFECTIVO A ENTREGAR: $" + entregar + "*";
            
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
