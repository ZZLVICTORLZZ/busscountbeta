<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount BETA - v7.5</title>
    <style>
        :root { 
            --turquesa: #00acc1; 
            --fondo: #000; 
            --gris: #1a1a1a; 
            --verde_wa: #25d366; 
            --rojo_suave: #e57373; 
            --verde_balance: #66bb6a;
        }
        
        body { background: var(--fondo); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--gris); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; }
        .btn-turquesa { background: var(--turquesa); color: #000; }
        .btn-wa { background: var(--verde_wa); color: #000; }
        .btn-rojo { background: #b71c1c; color: #fff; }
        .btn-gris { background: #333; color: #fff; }
        /* Estilo para el nuevo botón de cálculo */
        .btn-calculo { background: transparent; border: 2px solid var(--turquesa); color: var(--turquesa); }

        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--turquesa); margin: 5px 0; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cuadricula label { color: var(--turquesa); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        
        input { background: #000; color: var(--turquesa); border: 1px solid var(--turquesa); padding: 12px; width: 85%; font-size: 1.8rem; text-align: center; border-radius: 8px; font-weight: bold; }
        
        .gasto-fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .gasto-fila label { color: var(--rojo_suave); font-size: 0.8rem; font-weight: bold; text-align: left; flex: 1; }
        .input-gasto { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; font-size: 1.1rem !important; padding: 6px !important; width: 100px !important; text-align: right !important; margin: 0 !important; }
        
        .fila-historial { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 1rem; align-items: center; }
        .monto-texto { font-weight: bold; color: var(--turquesa); }
        .pasajeros-texto { color: #888; font-size: 0.85rem; margin-right: 10px; }
    </style>
</head>
<body onload="iniciarApp()">

    <div style="background: var(--turquesa); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px;">MODO BETA - CÁLCULO DE ENTREGA v7.5</div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="destino" style="background: #222; color: var(--turquesa); border: 1px solid var(--turquesa); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top:10px;">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="total-vuelta">0</span></div>
            <div id="aviso-extra" style="font-size: 0.8rem; color: var(--turquesa); height: 1.2rem;"></div>
        </div>

        <div class="tarjeta">
            <div class="cuadricula">
                <div><label>$14</label><input type="number" id="bol14" oninput="sumar()" placeholder="0"></div>
                <div><label>$55</label><input type="number" id="bol55" oninput="sumar()" placeholder="0"></div>
                <div><label>$47</label><input type="number" id="bol47" oninput="sumar()" placeholder="0"></div>
                <div><label>$37</label><input type="number" id="bol37" oninput="sumar()" placeholder="0"></div>
            </div>
            
            <div style="margin-top:15px; border-top: 1px solid #444; padding-top:15px;">
                <label style="color: var(--turquesa); font-size: 0.9rem; font-weight: bold;">CORTESÍAS (GRATIS)</label>
                <input type="text" id="nombre-cortesia" placeholder="NOMBRE" style="font-size: 1.2rem; width: 90%; margin-top: 5px; text-transform: uppercase;">
                <button class="btn btn-gris" style="color:var(--turquesa); padding: 10px; font-size: 0.9rem;" onclick="agregarCortesia()">+ AGREGAR CORTESÍA</button>
            </div>

            <div style="margin-top:15px; border-top: 1px solid #333; padding-top:15px;">
                <label style="color: var(--turquesa); font-size: 0.9rem; font-weight: bold;">COBRO LIBRE / EXTRA</label>
                <div class="cuadricula" style="margin-top:5px;">
                    <input type="number" id="extra-precio" placeholder="$" style="font-size: 1.5rem;">
                    <input type="number" id="extra-cantidad" placeholder="#" style="font-size: 1.5rem;">
                </div>
                <button class="btn btn-gris" style="color:var(--turquesa); padding: 12px; font-size: 0.9rem;" onclick="agregarExtra()">+ AGREGAR EXTRA</button>
            </div>
        </div>

        <button class="btn btn-turquesa" onclick="finalizarVuelta()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.1rem; text-transform: uppercase;">Resumen de Cuenta</h2>
            <div style="color:#aaa; font-size:1rem;">Total Bruto: $<span id="bruto-total">0</span></div>
            <div style="color:var(--rojo_suave); font-size:1rem; margin-top: 5px;">Gastos Totales: -$<span id="gastos-etiqueta">0</span></div>
            <hr style="border: 0.5px solid #333; margin: 10px 0;">
            <div style="color:var(--verde_balance); font-size:0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;">Balance Real (Efectivo)</div>
            <div id="neto-total" style="font-size: 3rem; color:var(--verde_balance); font-weight:bold; margin-top: 5px;">$0</div>
        </div>

        <h3 style="color: var(--turquesa); font-size: 1rem; margin: 15px 0 5px 0;">VUELTAS REGISTRADAS</h3>
        <div id="lista-vueltas" class="tarjeta" style="padding:0; text-align:left; max-height: 150px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--rojo_suave); margin: 0 0 10px 0; font-size: 1rem;">CORTE DE GASTOS</h3>
            <div class="gasto-fila"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="actualizarBalance()" placeholder="0"></div>
            
            <button class="btn btn-calculo" onclick="irA('p-calc')">CALCULAR EFECTIVO A ENTREGAR</button>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ ENVIAR REPORTE POR WHATSAPP</button>
        <button class="btn btn-rojo" onclick="borrarTodo()">BORRAR TODO EL DÍA</button>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.1rem; text-transform: uppercase;">Calculadora de Entrega</h2>
            <p style="color: #888; font-size: 0.8rem;">(Aquí configuraremos las opciones que me expliques)</p>
        </div>

        <div id="opciones-calculo" class="tarjeta">
            <p style="color: var(--turquesa);">Esperando instrucciones...</p>
        </div>

        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL RESUMEN</button>
    </div>

    <script>
        var nVuelta = parseInt(localStorage.getItem('b_nv')) || 1;
        var historial = JSON.parse(localStorage.getItem('b_hist')) || [];
        var listaExtras = [];
        var listaCortesias = [];
        var brutoGlobal = 0;

        function iniciarApp() { dibujarHistorial(); }

        function sumar() {
            var fijos = (document.getElementById('bol14').value || 0) * 14 +
                        (document.getElementById('bol55').value || 0) * 55 +
                        (document.getElementById('bol47').value || 0) * 47 +
                        (document.getElementById('bol37').value || 0) * 37;
            var ext = 0; listaExtras.forEach(function(e){ ext += (e.p * e.c); });
            document.getElementById('total-vuelta').innerText = (fijos + ext);
        }

        function agregarExtra() {
            var p = parseFloat(document.getElementById('extra-precio').value) || 0;
            var c = parseInt(document.getElementById('extra-cantidad').value) || 0;
            if (p > 0 && c > 0) {
                listaExtras.push({p: p, c: c});
                document.getElementById('aviso-extra').innerText = "Agregado: $" + (p*c);
                document.getElementById('extra-precio').value = ""; document.getElementById('extra-cantidad').value = "";
                sumar();
            }
        }

        function agregarCortesia() {
            var nom = document.getElementById('nombre-cortesia').value.trim();
            if (nom !== "") {
                listaCortesias.push(nom.toUpperCase());
                document.getElementById('aviso-extra').innerText = "Cortesía: " + nom.toUpperCase();
                document.getElementById('nombre-cortesia').value = "";
            }
        }

        function finalizarVuelta() {
            var m = parseInt(document.getElementById('total-vuelta').innerText);
            var d = document.getElementById('destino').value;
            var b14 = parseInt(document.getElementById('bol14').value) || 0;
            var b55 = parseInt(document.getElementById('bol55').value) || 0;
            var b47 = parseInt(document.getElementById('bol47').value) || 0;
            var b37 = parseInt(document.getElementById('bol37').value) || 0;
            var tPasajeros = b14 + b55 + b47 + b37 + listaCortesias.length;
            listaExtras.forEach(function(e) { tPasajeros += e.c; });
            if (m === 0 && listaCortesias.length === 0 && !confirm("¿Guardar en $0?")) return;
            historial.push({ n: nVuelta, d: d, m: m, p: tPasajeros, det: { b14: b14, b55: b55, b47: b47, b37: b37, ext: [...listaExtras], cor: [...listaCortesias] } });
            localStorage.setItem('b_hist', JSON.stringify(historial));
            nVuelta++; localStorage.setItem('b_nv', nVuelta);
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            listaExtras = []; listaCortesias = [];
            document.getElementById('aviso-extra').innerText = "";
            irA('p-lib');
        }

        function actualizarBalance() {
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) +
                    (parseFloat(document.getElementById('g-caseta').value) || 0) +
                    (parseFloat(document.getElementById('g-despachadores').value) || 0) +
                    (parseFloat(document.getElementById('g-pension').value) || 0) +
                    (parseFloat(document.getElementById('g-sueldo').value) || 0);
            document.getElementById('gastos-etiqueta').innerText = g;
            document.getElementById('neto-total').innerText = "$" + (brutoGlobal - g);
        }

        function dibujarHistorial() {
            document.getElementById('titulo-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            var h = ""; brutoGlobal = 0;
            historial.forEach(function(v) {
                h += '<div class="fila-historial"><span><b>' + v.n + 'ª</b> ' + v.d + '</span>' +
                     '<span class="monto-texto"><span class="pasajeros-texto">' + v.p + ' pasajeros</span> $' + v.m + '</span></div>';
                brutoGlobal += v.m;
            });
            document.getElementById('lista-vueltas').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin registros</p>";
            document.getElementById('bruto-total').innerText = brutoGlobal;
            actualizarBalance(); sumar();
        }

        function irA(id) {
            document.getElementById('p-reg').classList.remove('activa');
            document.getElementById('p-lib').classList.remove('activa');
            document.getElementById('p-calc').classList.remove('activa');
            document.getElementById(id).classList.add('activa');
            if(id === 'p-lib') dibujarHistorial();
        }

        function borrarTodo() { if (confirm("¿Borrar todo el día?")) { localStorage.clear(); location.reload(); } }

        function enviarWhatsApp() {
            if (historial.length === 0) return alert("No hay datos.");
            var mensaje = "REPORTE DE CUENTA - BRUTO%0A";
            mensaje += "----------------------------%0A";
            historial.forEach(function(v) {
                mensaje += ""+ v.n + "ª " + v.d + "%0A";
                if(v.det.b14 > 0) mensaje += "• " + v.det.b14 + " de $14%0A";
                if(v.det.b55 > 0) mensaje += "• " + v.det.b55 + " de $55%0A";
                if(v.det.b47 > 0) mensaje += "• " + v.det.b47 + " de $47%0A";
                if(v.det.b37 > 0) mensaje += "• " + v.det.b37 + " de $37%0A";
                if(v.det.ext && v.det.ext.length > 0) {
                    v.det.ext.forEach(function(e) { mensaje += "• " + e.c + " de $" + e.p + " (Extra)%0A"; });
                }
                if(v.det.cor && v.det.cor.length > 0) {
                    v.det.cor.forEach(function(c) { mensaje += "• Cortesía: " + c + "%0A"; });
                }
                mensaje += "Total Pasajeros: " + v.p + "%0A";
                mensaje += "Subtotal: $" + v.m + "%0A%0A";
            });
            mensaje += "----------------------------%0A";
            mensaje += "TOTAL BRUTO: $" + brutoGlobal + "%0A";
            mensaje += "----------------------------";
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
</body>
</html>
