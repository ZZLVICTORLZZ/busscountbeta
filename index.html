<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Línea Turquesa - Proyecto Apolo 11</title>
    <style>
        :root { 
            --fondo: #F8E9D2; --tarjeta: #EFEBE1; --input_bg: #E6E0D4; --texto: #4A4A4A; 
            --turquesa: #1ABC9C; --gris_oscuro: #555555; --verde_btn: #A8DAB5; 
            --rojo_suave: #E38888; --rojo_btn: #FFB7B2; --borde_lineas: #DCD5C6; 
        }
        [data-theme="dark"] {
            --fondo: #121212; --tarjeta: #1E1E1E; --input_bg: #2C2C2C; --texto: #E0E0E0;
            --turquesa: #16A085; --borde_lineas: #333333;
        }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; transition: 0.3s; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--tarjeta); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; color: var(--texto); }
        .btn-turquesa { background: var(--turquesa); color: white; }
        .btn-wa { background: var(--verde_btn); }
        .btn-rojo { background: var(--rojo_btn); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--turquesa); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        input[type="number"], input[type="text"] { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 10px; width: 85%; font-size: 1.5rem; text-align: center; border-radius: 8px; font-weight: bold; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opcion-chequeo { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--borde_lineas); }
        .input-variable { width: 70px !important; font-size: 1rem !important; padding: 5px !important; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="splash-screen">
        <svg viewBox="0 0 200 120" width="180">
            <path d="M40 80 Q 100 20 180 60" fill="none" stroke="#1ABC9C" stroke-width="12" stroke-linecap="round"/>
            <path d="M30 90 Q 90 30 170 70" fill="none" stroke="#555" stroke-width="8" stroke-linecap="round"/>
            <path d="M50 70 L110 60 M115 62 L55 72 M80 65 Q 90 40 100 62" stroke="#000" stroke-width="4" fill="black"/>
        </svg>
        <div style="font-size: 1.6rem; font-weight: bold; color: var(--gris_oscuro); margin-top: 10px;">LÍNEA TURQUESA</div>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: var(--gris_oscuro); opacity: 0.6;">PROYECTO APOLO 11 V 1.0</div>
    </div>

    <div class="top-bar">
        <div style="font-weight: bold; letter-spacing: 1px;">LÍNEA TURQUESA</div>
        <span onclick="cambiarTema()" style="cursor:pointer; font-size: 1.2rem;">🌙</span>
    </div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.2rem;">1ª MEDIA VUELTA</h2>
            <select id="destino" style="width:100%; padding:10px; margin-top:10px; border-radius:8px;">
                <option>INDIOS VERDES</option><option>NUEVOS PASEOS</option><option>REYES</option>
            </select>
            <div id="total-vuelta" style="font-size: 2.5rem; color: var(--turquesa); font-weight: bold; margin: 10px 0;">$0</div>
        </div>
        <div class="tarjeta">
            <div class="cuadricula">
                <div><label>$14</label><input type="number" id="bol14" oninput="v2(this); sum();"></div>
                <div><label>$55</label><input type="number" id="bol55" oninput="v2(this); sum();"></div>
                <div><label>$47</label><input type="number" id="bol47" oninput="v2(this); sum();"></div>
                <div><label>$37</label><input type="number" id="bol37" oninput="v2(this); sum();"></div>
            </div>
            <div style="margin-top:10px; border-top:1px solid var(--borde_lineas); padding-top:10px;">
                <input type="text" id="n-cor" placeholder="NOMBRE CORTESÍA" style="font-size: 1rem; width: 60%;">
                <button class="btn btn-turquesa" style="width:30%; padding:8px; margin:0;" onclick="addCor()">+</button>
            </div>
        </div>
        <button class="btn btn-turquesa" onclick="finVuelta()">FINALIZAR VUELTA</button>
        <button class="btn" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h3 style="margin:0;">BALANCE GENERAL</h3>
            <div id="neto-total" style="font-size: 2.5rem; color: var(--turquesa); font-weight: bold;">$0</div>
            <div style="font-size:0.8rem; color:var(--rojo_suave);">Gastos: -$<span id="g-total">0</span></div>
        </div>
        <div id="lista-vueltas" class="tarjeta" style="text-align:left; max-height:150px; overflow-y:auto;"></div>
        <div class="tarjeta">
            <h4 style="margin:0; color:var(--rojo_suave);">GASTOS</h4>
            <div class="cuadricula" style="margin-top:10px;">
                <input type="number" id="g-diesel" placeholder="DIESEL" oninput="actBal()">
                <input type="number" id="g-caseta" placeholder="CASETA" oninput="actBal()">
                <input type="number" id="g-desp" placeholder="DESP." oninput="actBal()">
                <input type="number" id="g-sueldo" placeholder="SUELDO" oninput="actBal()">
            </div>
        </div>
        <button class="btn btn-turquesa" onclick="irA('p-calc')">CALCULAR LIQUIDACIÓN</button>
        <button class="btn btn-wa" onclick="enviarWA()">REPORTE GENERAL WA</button>
        <button class="btn btn-rojo" onclick="cerrarDia()">CERRAR Y GUARDAR DÍA</button>
        <button class="btn" onclick="irA('p-hist')">HISTORIAL 7 DÍAS</button>
        <button class="btn" onclick="irA('p-reg')">VOLVER</button>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta">
            <h3>EFECTIVO A ENTREGAR</h3>
            <div id="final-entrega" style="font-size: 3rem; color: var(--turquesa); font-weight: bold;">$0</div>
        </div>
        <div class="tarjeta">
            <div class="opcion-chequeo"><label>MUTUALIDAD ($20)</label><input type="checkbox" id="c-mut" onchange="actLiq()"></div>
            <div class="opcion-chequeo"><label>SEGURIDAD ($20)</label><input type="checkbox" id="c-seg" onchange="actLiq()"></div>
            <div class="opcion-chequeo"><label>BASES</label><input type="number" class="input-variable" id="v-bas" oninput="actLiq()"></div>
            <div class="opcion-chequeo"><label style="color:var(--rojo_suave)">BOLETOS ENTREGADOS</label><input type="number" class="input-variable" id="v-bol" oninput="actLiq()"></div>
        </div>
        <button class="btn btn-wa" onclick="enviarWALiq()">ENVIAR LIQUIDACIÓN WA</button>
        <button class="btn" onclick="irA('p-lib')">VOLVER</button>
    </div>

    <div id="p-hist" class="pantalla">
        <div class="tarjeta"><h3>HISTORIAL SEMANAL</h3><div id="cont-hist" style="text-align:left;"></div></div>
        <button class="btn btn-turquesa" onclick="irA('p-lib')">VOLVER</button>
    </div>

    <script>
        let nV = parseInt(localStorage.getItem('ap_nv')) || 1;
        let vueltas = JSON.parse(localStorage.getItem('ap_v')) || [];
        let cortesias = [];
        let bruto = 0, neto = 0;

        function iniciarApp() { 
            setTimeout(() => document.getElementById('splash-screen').style.display='none', 2500);
            actUI();
        }

        // VALIDACIÓN: Máximo 2 cifras para pasaje
        function v2(i) { if(i.value.length > 2) i.value = i.value.slice(0,2); }

        function sum() {
            let t = (parseInt(document.getElementById('bol14').value)||0)*14 + (parseInt(document.getElementById('bol55').value)||0)*55 + (parseInt(document.getElementById('bol47').value)||0)*47 + (parseInt(document.getElementById('bol37').value)||0)*37;
            document.getElementById('total-vuelta').innerText = "$" + t;
        }

        function addCor() {
            let n = document.getElementById('n-cor').value.trim();
            if(n) { cortesias.push(n.toUpperCase()); document.getElementById('n-cor').value = ""; alert("Cortesía anotada"); }
        }

        function finVuelta() {
            let m = parseInt(document.getElementById('total-vuelta').innerText.replace('$',''));
            let d = document.getElementById('destino').value;
            vueltas.push({ n: nV, d: d, m: m, cor: [...cortesias] });
            localStorage.setItem('ap_v', JSON.stringify(vueltas));
            nV++; localStorage.setItem('ap_nv', nV);
            cortesias = [];
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            sum(); actUI(); irA('p-lib');
        }

        function actBal() {
            let g = (parseFloat(document.getElementById('g-diesel').value)||0) + (parseFloat(document.getElementById('g-caseta').value)||0) + (parseFloat(document.getElementById('g-desp').value)||0) + (parseFloat(document.getElementById('g-sueldo').value)||0);
            neto = bruto - g;
            document.getElementById('g-total').innerText = g;
            document.getElementById('neto-total').innerText = "$" + neto;
            actLiq();
        }

        function actLiq() {
            let a = 0;
            if(document.getElementById('c-mut').checked) a += 20;
            if(document.getElementById('c-seg').checked) a += 20;
            a += (parseFloat(document.getElementById('v-bas').value)||0);
            let b = (parseFloat(document.getElementById('v-bol').value)||0);
            document.getElementById('final-entrega').innerText = "$" + (neto + a - b);
        }

        function actUI() {
            document.getElementById('titulo-vuelta').innerText = nV + "ª MEDIA VUELTA";
            let h = ""; bruto = 0;
            vueltas.forEach(v => { h += `<div><b>${v.n}ª ${v.d}:</b> $${v.m}</div>`; bruto += v.m; });
            document.getElementById('lista-vueltas').innerHTML = h || "Sin vueltas";
            actBal();
        }

        function cerrarDia() {
            if(!confirm("¿Cerrar día y guardar historial?")) return;
            let hd = JSON.parse(localStorage.getItem('ap_hd')) || [];
            hd.push({ f: new Date().toLocaleDateString(), t: neto });
            if(hd.length > 7) hd.shift();
            localStorage.setItem('ap_hd', JSON.stringify(hd));
            localStorage.removeItem('ap_v'); localStorage.removeItem('ap_nv');
            location.reload();
        }

        function irA(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-hist') {
                let hd = JSON.parse(localStorage.getItem('ap_hd')) || [];
                document.getElementById('cont-hist').innerHTML = hd.map(d => `<div>${d.f}: $${d.t}</div>`).join('') || "Vacío";
            }
        }

        function cambiarTema() {
            let b = document.body;
            b.getAttribute('data-theme') === 'dark' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }

        function enviarWA() {
            let msj = "*LÍNEA TURQUESA - REPORTE*%0A";
            vueltas.forEach(v => msj += `*${v.n}ª ${v.d}:* $${v.m}%0A`);
            msj += `%0A*TOTAL BRUTO:* $${bruto}%0A*NETO:* $${neto}`;
            window.open("https://wa.me/?text=" + msj, "_blank");
        }

        function enviarWALiq() {
            let e = document.getElementById('final-entrega').innerText;
            let msj = `*LIQUIDACIÓN APOLO 11*%0A------------------%0A*EFECTIVO A ENTREGAR: ${e}*`;
            window.open("https://wa.me/?text=" + msj, "_blank");
        }
    </script>
</body>
</html>
