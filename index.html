<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount DEV - Pruebas</title>
    <style>
        :root { --p: #00e5ff; --bg: #000; --c: #1a1a1a; --wa: #25d366; --dev: #ff5252; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        /* MARCA DE LABORATORIO */
        .barra-dev { background: var(--dev); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px; position: sticky; top: 0; z-index: 100; }
        
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--c); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; cursor: pointer; }
        .btn-turquesa { background: var(--p); color: #000; }
        .btn-wa { background: var(--wa); color: #000; }
        .btn-rojo { background: #b71c1c; color: #fff; }
        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--p); margin: 5px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid label { color: var(--p); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        input { background: #000; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 85%; font-size: 1.9rem; text-align: center; border-radius: 8px; font-weight: bold; }
        select { background: #222; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; }
    </style>
</head>
<body onload="iniciarApp()">

    <div class="barra-dev">MODO EXPERIMENTAL - VERSIÓN 6.0</div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="txt-v" style="color:var(--p); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="sel-d" style="margin-top:10px;">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="t-v">0</span></div>
            <div id="log-ex" style="font-size: 0.8rem; color: var(--p); height: 1.2rem;"></div>
        </div>

        <div class="tarjeta">
            <div class="grid">
                <div><label>$14</label><input type="number" id="i14" oninput="sumar()"></div>
                <div><label>$55</label><input type="number" id="i55" oninput="sumar()"></div>
                <div><label>$47</label><input type="number" id="i47" oninput="sumar()"></div>
                <div><label>$37</label><input type="number" id="i37" oninput="sumar()"></div>
            </div>
            <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                <label style="color: var(--p); font-size: 0.9rem; font-weight: bold;">COBRO LIBRE</label>
                <div class="grid">
                    <input type="number" id="l-p" placeholder="$" style="font-size: 1.5rem;">
                    <input type="number" id="l-c" placeholder="#" style="font-size: 1.5rem;">
                </div>
                <button class="btn btn-turquesa" style="opacity: 0.6; padding: 12px;" onclick="agregarLibre()">+ AGREGAR EXTRA</button>
            </div>
        </div>

        <button class="btn btn-turquesa" onclick="finalizar()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" style="background:#333; color:#fff;" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--p);">RESUMEN DEV</h2>
            <div id="t-dia" style="font-size: 2.5rem; color:var(--p); font-weight:bold;">$0</div>
        </div>
        <div id="lista" class="tarjeta" style="padding:0; text-align:left;"></div>
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ ENVIAR REPORTE</button>
        <button class="btn btn-rojo" onclick="reset()">BORRAR TODO</button>
    </div>

    <script>
        // Uso de prefijo 'dev_' para no mezclar datos con la app real
        var numV = parseInt(localStorage.getItem('dev_v_n')) || 1;
        var hist = JSON.parse(localStorage.getItem('dev_v_h')) || [];
        var libresActuales = [];

        function iniciarApp() { render(); }
        function sumar() {
            var fijos = (document.getElementById('i14').value || 0) * 14 +
                        (document.getElementById('i55').value || 0) * 55 +
                        (document.getElementById('i47').value || 0) * 47 +
                        (document.getElementById('i37').value || 0) * 37;
            var totalLibres = 0;
            libresActuales.forEach(function(l) { totalLibres += (l.p * l.c); });
            document.getElementById('t-v').innerText = (fijos + totalLibres);
        }
        function agregarLibre() {
            var p = parseFloat(document.getElementById('l-p').value) || 0;
            var c = parseInt(document.getElementById('l-c').value) || 0;
            if (p > 0 && c > 0) {
                libresActuales.push({p: p, c: c});
                document.getElementById('log-ex').innerText = "Extra: +$" + (p*c);
                document.getElementById('l-p').value = ""; document.getElementById('l-c').value = "";
                sumar();
            }
        }
        function finalizar() {
            var m = parseInt(document.getElementById('t-v').innerText);
            var d = document.getElementById('sel-d').value;
            var c14 = parseInt(document.getElementById('i14').value) || 0;
            var c55 = parseInt(document.getElementById('i55').value) || 0;
            var c47 = parseInt(document.getElementById('i47').value) || 0;
            var c37 = parseInt(document.getElementById('i37').value) || 0;
            if (m === 0 && !confirm("¿Guardar en $0?")) return;
            var tPax = c14 + c55 + c47 + c37;
            libresActuales.forEach(function(l) { tPax += l.c; });
            hist.push({ n: numV, d: d, m: m, pTot: tPax, det: { p14: c14, p55: c55, p47: c47, p37: c37, libres: [...libresActuales] } });
            localStorage.setItem('dev_v_h', JSON.stringify(hist));
            numV++; localStorage.setItem('dev_v_n', numV);
            document.getElementById('i14').value=""; document.getElementById('i55').value="";
            document.getElementById('i47').value=""; document.getElementById('i37').value="";
            libresActuales = []; document.getElementById('log-ex').innerText = "";
            irA('p-lib');
        }
        function render() {
            document.getElementById('txt-v').innerText = numV + "ª MEDIA VUELTA";
            var h = ""; var total = 0;
            hist.forEach(function(v) {
                h += '<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;">' +
                     '<span><b>' + v.n + 'ª</b> ' + v.d + '</span><span>' + v.pTot + ' pax | <b>$' + v.m + '</b></span></div>';
                total += v.m;
            });
            document.getElementById('lista').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin datos registrados</p>";
            document.getElementById('t-dia').innerText = "$" + total;
            sumar();
        }
        function irA(id) {
            document.getElementById('p-reg').classList.remove('activa');
            document.getElementById('p-lib').classList.remove('activa');
            document.getElementById(id).classList.add('activa');
            render();
        }
        function reset() { if (confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
        function enviarWhatsApp() {
            var mensaje = "REPORTE PRUEBA (DEV)%0A";
            hist.forEach(function(v) { mensaje += v.n + "ª " + v.d + ": $" + v.m + "%0A"; });
            mensaje += "TOTAL: " + document.getElementById('t-dia').innerText + "";
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
</body>
</html>
