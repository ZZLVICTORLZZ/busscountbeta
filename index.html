


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount BETA - v6.7</title>
    <style>
        :root { --p: #00e5ff; --bg: #000; --c: #1a1a1a; --wa: #25d366; --red: #ff5252; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--c); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; cursor: pointer; }
        .btn-turquesa { background: var(--p); color: #000; }
        .btn-wa { background: var(--wa); color: #000; }
        .btn-rojo { background: var(--red); color: #fff; }
        .btn-gris { background: #333; color: #fff; }

        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--p); margin: 5px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid label { color: var(--p); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        input { background: #000; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 85%; font-size: 1.8rem; text-align: center; border-radius: 8px; font-weight: bold; }
        
        .gasto-item { text-align: left; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .gasto-item label { color: var(--red); font-size: 0.9rem; margin-bottom: 2px; font-weight: bold; }
        .input-gasto { border-color: var(--red) !important; color: var(--red) !important; font-size: 1.2rem !important; padding: 8px !important; }
        
        /* Ajuste para que quepa el pax y el dinero */
        .fila-v { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 1rem; align-items: center; }
        .v-info { text-align: left; }
        .v-monto { text-align: right; font-weight: bold; color: var(--p); }
        .v-pax { color: #888; font-size: 0.85rem; margin-right: 10px; }
    </style>
</head>
<body onload="iniciarApp()">

    <div style="background: var(--p); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px;">MODO BETA - PASAJEROS POR VUELTA 6.7</div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="txt-v" style="color:var(--p); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="sel-d" style="background: #222; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top:10px;">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="t-v">0</span></div>
            <div id="log-ex" style="font-size: 0.8rem; color: var(--p); height: 1.2rem;"></div>
        </div>

        <div class="tarjeta">
            <div class="grid">
                <div><label>$14</label><input type="number" id="i14" oninput="sumar()" placeholder="0"></div>
                <div><label>$55</label><input type="number" id="i55" oninput="sumar()" placeholder="0"></div>
                <div><label>$47</label><input type="number" id="i47" oninput="sumar()" placeholder="0"></div>
                <div><label>$37</label><input type="number" id="i37" oninput="sumar()" placeholder="0"></div>
            </div>
            
            <div style="margin-top:15px; border-top: 1px solid #333; padding-top:15px;">
                <label style="color: var(--p); font-size: 0.9rem; font-weight: bold;">COBRO LIBRE / EXTRA</label>
                <div class="grid" style="margin-top:5px;">
                    <input type="number" id="l-p" placeholder="$" style="font-size: 1.5rem;">
                    <input type="number" id="l-c" placeholder="#" style="font-size: 1.5rem;">
                </div>
                <button class="btn btn-gris" style="color:var(--p); padding: 12px; font-size: 0.9rem;" onclick="agregarLibre()">+ AGREGAR EXTRA</button>
            </div>
        </div>

        <button class="btn btn-turquesa" onclick="finalizar()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--p); margin-bottom:10px; font-size: 1.1rem; text-transform: uppercase;">Resumen de Cuenta</h2>
            <div style="color:#00e5ff; font-size:1.1rem;">Total de Vueltas: $<span id="t-bruto">0</span></div>
            <div style="color:var(--red); font-size:1.1rem; margin-top: 5px;">Gastos Totales: -$<span id="t-gastos-label">0</span></div>
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <div style="color:#aaa; font-size:0.9rem; text-transform: uppercase; letter-spacing: 1px;">Balance Real (Efectivo)</div>
            <div id="t-neto" style="font-size: 3rem; color:var(--p); font-weight:bold; margin-top: 5px;">$0</div>
        </div>

        <h3 style="color: var(--p); font-size: 1rem; margin: 15px 0 5px 0;">VUELTAS REGISTRADAS</h3>
        <div id="lista" class="tarjeta" style="padding:0; text-align:left; max-height: 220px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--red); margin: 0 0 15px 0;">CORTE DE GASTOS</h3>
            <div class="gasto-item"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="calcularBalance()" placeholder="0.00"></div>
            <div class="gasto-item"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="calcularBalance()" placeholder="0.00"></div>
            <div class="gasto-item"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="calcularBalance()" placeholder="0.00"></div>
            <div class="gasto-item"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="calcularBalance()" placeholder="0.00"></div>
            <div class="gasto-item"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="calcularBalance()" placeholder="0.00"></div>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ ENVIAR REPORTE POR WHATSAPP</button>
        <button class="btn btn-rojo" onclick="reset()">BORRAR TODO EL DÍA</button>
    </div>

    <script>
        var numV = parseInt(localStorage.getItem('beta_vn')) || 1;
        var hist = JSON.parse(localStorage.getItem('beta_vh')) || [];
        var libresActuales = [];
        var totalBrutoGlobal = 0;

        function iniciarApp() { render(); }

        function sumar() {
            var fijos = (document.getElementById('i14').value || 0) * 14 +
                        (document.getElementById('i55').value || 0) * 55 +
                        (document.getElementById('i47').value || 0) * 47 +
                        (document.getElementById('i37').value || 0) * 37;
            var totalLibres = 0;
            libresActuales.forEach(function(l) { totalLibres += (l.p * l.c); });
            document.getElementById('t-v').innerText = (fijos + totalLibres);
        }

        function agregarLibre() {
            var p = parseFloat(document.getElementById('l-p').value) || 0;
            var c = parseInt(document.getElementById('l-c').value) || 0;
            if (p > 0 && c > 0) {
                libresActuales.push({p: p, c: c});
                document.getElementById('log-ex').innerText = "Extra: +$" + (p*c);
                document.getElementById('l-p').value = ""; document.getElementById('l-c').value = "";
                sumar();
            }
        }

        function finalizar() {
            var m = parseInt(document.getElementById('t-v').innerText);
            var d = document.getElementById('sel-d').value;
            
            // Calcular pasajeros totales de esta vuelta
            var c14 = parseInt(document.getElementById('i14').value) || 0;
            var c55 = parseInt(document.getElementById('i55').value) || 0;
            var c47 = parseInt(document.getElementById('i47').value) || 0;
            var c37 = parseInt(document.getElementById('i37').value) || 0;
            var tPax = c14 + c55 + c47 + c37;
            libresActuales.forEach(function(l) { tPax += l.c; });

            if (m === 0 && !confirm("¿Guardar en $0?")) return;

            hist.push({ n: numV, d: d, m: m, p: tPax }); // Guardamos 'p' de pasajeros
            localStorage.setItem('beta_vh', JSON.stringify(hist));
            numV++; localStorage.setItem('beta_vn', numV);
            
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            libresActuales = []; document.getElementById('log-ex').innerText = "";
            irA('p-lib');
        }

        function calcularBalance() {
            var g1 = parseFloat(document.getElementById('g-diesel').value) || 0;
            var g2 = parseFloat(document.getElementById('g-caseta').value) || 0;
            var g3 = parseFloat(document.getElementById('g-despachadores').value) || 0;
            var g4 = parseFloat(document.getElementById('g-pension').value) || 0;
            var g5 = parseFloat(document.getElementById('g-sueldo').value) || 0;
            var sumaGastos = g1 + g2 + g3 + g4 + g5;
            document.getElementById('t-gastos-label').innerText = sumaGastos;
            document.getElementById('t-neto').innerText = "$" + (totalBrutoGlobal - sumaGastos);
        }

        function render() {
            document.getElementById('txt-v').innerText = numV + "ª MEDIA VUELTA";
            var h = ""; totalBrutoGlobal = 0;
            hist.forEach(function(v) {
                h += '<div class="fila-v">' +
                     '<span class="v-info"><b>' + v.n + 'ª</b> ' + v.d + '</span>' +
                     '<span class="v-monto"><span class="v-pax">' + (v.p || 0) + ' pax</span> $' + v.m + '</span>' +
                     '</div>';
                totalBrutoGlobal += v.m;
            });
            document.getElementById('lista').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin registros</p>";
            document.getElementById('t-bruto').innerText = totalBrutoGlobal;
            calcularBalance();
            sumar();
        }

        function irA(id) {
            document.getElementById('p-reg').classList.remove('activa');
            document.getElementById('p-lib').classList.remove('activa');
            document.getElementById(id).classList.add('activa');
            render();
        }

        function reset() { if (confirm("¿Borrar todo el día?")) { localStorage.clear(); location.reload(); } }

        function enviarWhatsApp() {
            if (hist.length === 0) return alert("No hay datos.");
            var mensaje = "REPORTE DE CUENTA - BRUTO%0A";
            mensaje += "----------------------------%0A";
            hist.forEach(function(v) {
                mensaje += v.n + "ª " + v.d + ": $" + v.m + "%0A";
            });
            mensaje += "----------------------------%0A";
            mensaje += "TOTAL BRUTO: $" + totalBrutoGlobal + "%0A";
            mensaje += "----------------------------";
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
</body>
</html>
