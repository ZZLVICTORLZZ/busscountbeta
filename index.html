<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount BETA - v8.1</title>
    <style>
        :root { 
            --turquesa: #00acc1; 
            --fondo: #000; 
            --gris: #1a1a1a; 
            --verde_wa: #25d366; 
            --rojo_suave: #e57373; 
            --verde_balance: #66bb6a;
        }
        
        body { background: var(--fondo); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--gris); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; }
        .btn-turquesa { background: var(--turquesa); color: #000; }
        .btn-wa { background: var(--verde_wa); color: #000; }
        .btn-rojo { background: #b71c1c; color: #fff; }
        .btn-gris { background: #333; color: #fff; }
        .btn-calculo { background: transparent; border: 2px solid var(--turquesa); color: var(--turquesa); }

        .opcion-chequeo { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #222; }
        .opcion-chequeo label { font-size: 0.75rem; font-weight: bold; color: #ccc; flex: 1; text-align: left; }
        .check-box { width: 16px; height: 16px; accent-color: var(--turquesa); margin-right: 10px; }
        
        /* CASILLAS MANUALES EXTRA DELGADAS */
        .input-variable { width: 38px; height: 16px; background: #000; border: 1px solid #444; color: var(--turquesa); padding: 1px; border-radius: 3px; text-align: center; font-weight: bold; font-size: 0.8rem; }
        .input-rojo { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; }

        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--turquesa); margin: 5px 0; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cuadricula label { color: var(--turquesa); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        input[type="number"], input[type="text"] { background: #000; color: var(--turquesa); border: 1px solid var(--turquesa); padding: 12px; width: 85%; font-size: 1.5rem; text-align: center; border-radius: 8px; font-weight: bold; }
        
        .gasto-fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .gasto-fila label { color: var(--rojo_suave); font-size: 0.8rem; font-weight: bold; text-align: left; flex: 1; }
        .input-gasto { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; font-size: 1.1rem !important; padding: 6px !important; width: 85px !important; text-align: right !important; margin: 0 !important; }
        
        .fila-historial { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9rem; align-items: center; }
        .monto-texto { font-weight: bold; color: var(--turquesa); }
    </style>
</head>
<body onload="iniciarApp()">

    <div style="background: var(--turquesa); color: #000; font-size: 0.7rem; font-weight: bold; padding: 2px;">MODO BETA - LÓGICA CORREGIDA v8.1</div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="destino" style="background: #222; color: var(--turquesa); border: 1px solid var(--turquesa); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top:10px;">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="total-vuelta">0</span></div>
            <div id="aviso-extra" style="font-size: 0.8rem; color: var(--turquesa); height: 1.2rem;"></div>
        </div>
        <div class="tarjeta">
            <div class="cuadricula">
                <div><label>$14</label><input type="number" id="bol14" oninput="sumar()"></div>
                <div><label>$55</label><input type="number" id="bol55" oninput="sumar()"></div>
                <div><label>$47</label><input type="number" id="bol47" oninput="sumar()"></div>
                <div><label>$37</label><input type="number" id="bol37" oninput="sumar()"></div>
            </div>
            <div style="margin-top:10px; border-top: 1px solid #444; padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">CORTESÍAS</label>
                <input type="text" id="nombre-cortesia" placeholder="NOMBRE" style="width: 80%; font-size: 1.2rem; margin-top: 5px;">
                <button class="btn btn-gris" style="padding: 8px;" onclick="agregarCortesia()">+ AGREGAR</button>
            </div>
            <div style="margin-top:10px; border-top: 1px solid #333; padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">EXTRA</label>
                <div class="cuadricula" style="margin-top:5px;">
                    <input type="number" id="extra-precio" placeholder="$">
                    <input type="number" id="extra-cantidad" placeholder="#">
                </div>
                <button class="btn btn-gris" style="padding: 8px;" onclick="agregarExtra()">+ EXTRA</button>
            </div>
        </div>
        <button class="btn btn-turquesa" onclick="finalizarVuelta()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.1rem; text-transform: uppercase;">Resumen</h2>
            <div style="color:#aaa; font-size:0.9rem;">Total Bruto: $<span id="bruto-total">0</span></div>
            <div style="color:var(--rojo_suave); font-size:0.9rem; margin-top: 5px;">Gastos Ruta: -$<span id="gastos-etiqueta">0</span></div>
            <hr style="border: 0.5px solid #333; margin: 8px 0;">
            <div id="neto-total" style="font-size: 2.5rem; color:var(--verde_balance); font-weight:bold;">$0</div>
        </div>

        <div id="lista-vueltas" class="tarjeta" style="padding:0; text-align:left; max-height: 120px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--rojo_suave); margin: 0 0 10px 0; font-size: 0.9rem;">GASTOS DE RUTA</h3>
            <div class="gasto-fila"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="actualizarBalance()" placeholder="0"></div>
            <button class="btn btn-calculo" onclick="irA('p-calc')">CALCULAR EFECTIVO ENTREGAR</button>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ REPORTE WHATSAPP</button>
        <button class="btn btn-rojo" onclick="borrarTodo()">BORRAR TODO</button>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin:0; font-size: 1.1rem; text-transform: uppercase;">Liquidación Final</h2>
        </div>

        <div class="tarjeta">
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-mut" onchange="recalcularLiquidacion()"><label>MUTUALIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-seg" onchange="recalcularLiquidacion()"><label>SEGURIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-opd" onchange="recalcularLiquidacion()"><label>OPERACIÓN DIESEL ($50)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-pen" onchange="recalcularLiquidacion()"><label>PENSIÓN / COBRO ($40)</label></div>
            
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-fia" onchange="recalcularLiquidacion()"><label>FIANZA</label><input type="number" class="input-variable" id="v-fia" oninput="recalcularLiquidacion()" placeholder="$"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-bas" onchange="recalcularLiquidacion()"><label>BASES</label><input type="number" class="input-variable" id="v-bas" oninput="recalcularLiquidacion()" placeholder="$"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-tag" onchange="recalcularLiquidacion()"><label>TAG</label><input type="number" class="input-variable" id="v-tag" oninput="recalcularLiquidacion()" placeholder="$"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-vdi" onchange="recalcularLiquidacion()"><label>VALE DIESEL</label><input type="number" class="input-variable" id="v-vdi" oninput="recalcularLiquidacion()" placeholder="$"></div>
            
            <div class="opcion-chequeo" style="border-top: 1px solid #444; margin-top: 5px; padding-top: 5px;">
                <input type="checkbox" class="check-box" id="c-bol" onchange="recalcularLiquidacion()">
                <label style="color:var(--rojo_suave)">TOTAL EN BOLETOS</label>
                <input type="number" class="input-variable input-rojo" id="v-bol" oninput="recalcularLiquidacion()" placeholder="$">
            </div>
        </div>

        <div class="tarjeta">
            <div style="color:var(--verde_balance); font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">Efectivo Entregar</div>
            <div id="final-entrega" style="font-size: 3.5rem; color:var(--verde_balance); font-weight:bold; margin-top: 5px;">$0</div>
        </div>

        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR</button>
    </div>

    <script>
        var nVuelta = parseInt(localStorage.getItem('b_nv')) || 1;
        var historial = JSON.parse(localStorage.getItem('b_hist')) || [];
        var listaExtras = [], listaCortesias = [], brutoGlobal = 0, netoRuta = 0;

        function iniciarApp() { dibujarHistorial(); }

        function sumar() {
            var f = (document.getElementById('bol14').value || 0) * 14 + (document.getElementById('bol55').value || 0) * 55 + (document.getElementById('bol47').value || 0) * 47 + (document.getElementById('bol37').value || 0) * 37;
            var e = 0; listaExtras.forEach(function(x){ e += (x.p * x.c); });
            document.getElementById('total-vuelta').innerText = (f + e);
        }

        function agregarExtra() {
            var p = parseFloat(document.getElementById('extra-precio').value) || 0;
            var c = parseInt(document.getElementById('extra-cantidad').value) || 0;
            if (p > 0 && c > 0) { listaExtras.push({p: p, c: c}); sumar(); document.getElementById('extra-precio').value = ""; document.getElementById('extra-cantidad').value = ""; }
        }

        function agregarCortesia() {
            var n = document.getElementById('nombre-cortesia').value.trim();
            if (n !== "") { listaCortesias.push(n.toUpperCase()); document.getElementById('nombre-cortesia').value = ""; }
        }

        function finalizarVuelta() {
            var m = parseInt(document.getElementById('total-vuelta').innerText);
            var d = document.getElementById('destino').value;
            var tPas = (parseInt(document.getElementById('bol14').value) || 0) + (parseInt(document.getElementById('bol55').value) || 0) + (parseInt(document.getElementById('bol47').value) || 0) + (parseInt(document.getElementById('bol37').value) || 0) + listaCortesias.length;
            listaExtras.forEach(function(e) { tPas += e.c; });
            historial.push({ n: nVuelta, d: d, m: m, p: tPas, det: { b14: (parseInt(document.getElementById('bol14').value) || 0), b55: (parseInt(document.getElementById('bol55').value) || 0), b47: (parseInt(document.getElementById('bol47').value) || 0), b37: (parseInt(document.getElementById('bol37').value) || 0), ext: [...listaExtras], cor: [...listaCortesias] } });
            localStorage.setItem('b_hist', JSON.stringify(historial));
            nVuelta++; localStorage.setItem('b_nv', nVuelta);
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            listaExtras = []; listaCortesias = []; irA('p-lib');
        }

        function actualizarBalance() {
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + (parseFloat(document.getElementById('g-caseta').value) || 0) + (parseFloat(document.getElementById('g-despachadores').value) || 0) + (parseFloat(document.getElementById('g-pension').value) || 0) + (parseFloat(document.getElementById('g-sueldo').value) || 0);
            netoRuta = brutoGlobal - g;
            document.getElementById('gastos-etiqueta').innerText = g;
            document.getElementById('neto-total').innerText = "$" + netoRuta;
            recalcularLiquidacion();
        }

        function recalcularLiquidacion() {
            var ajuste = 0;
            // ESTOS SUMAN (+)
            if(document.getElementById('c-mut').checked) ajuste += 20;
            if(document.getElementById('c-seg').checked) ajuste += 20;
            if(document.getElementById('c-opd').checked) ajuste += 50;
            if(document.getElementById('c-pen').checked) ajuste += 40;
            if(document.getElementById('c-fia').checked) ajuste += (parseFloat(document.getElementById('v-fia').value) || 0);
            if(document.getElementById('c-bas').checked) ajuste += (parseFloat(document.getElementById('v-bas').value) || 0);
            if(document.getElementById('c-tag').checked) ajuste += (parseFloat(document.getElementById('v-tag').value) || 0);
            if(document.getElementById('c-vdi').checked) ajuste += (parseFloat(document.getElementById('v-vdi').value) || 0);
            
            // ESTE RESTA (-)
            var restaBoletos = 0;
            if(document.getElementById('c-bol').checked) restaBoletos = (parseFloat(document.getElementById('v-bol').value) || 0);
            
            document.getElementById('final-entrega').innerText = "$" + (netoRuta + ajuste - restaBoletos);
        }

        function dibujarHistorial() {
            document.getElementById('titulo-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            var h = ""; brutoGlobal = 0;
            historial.forEach(function(v) {
                h += '<div class="fila-historial"><span><b>' + v.n + 'ª</b> ' + v.d + '</span><span class="monto-texto">' + v.p + ' pas. - $' + v.m + '</span></div>';
                brutoGlobal += v.m;
            });
            document.getElementById('lista-vueltas').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin vueltas</p>";
            document.getElementById('bruto-total').innerText = brutoGlobal;
            actualizarBalance();
        }

        function irA(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-lib') dibujarHistorial();
        }

        function borrarTodo() { if (confirm("¿Borrar todo el día?")) { localStorage.clear(); location.reload(); } }

        function enviarWhatsApp() {
            var mensaje = "*REPORTE DE CUENTA*%0A";
            historial.forEach(function(v) { mensaje += "*"+ v.n + "ª " + v.d + "*: $" + v.m + " (" + v.p + " pas)%0A"; });
            mensaje += "*TOTAL BRUTO: $" + brutoGlobal + "*";
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
</body>
</html>
