<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Línea Turquesa - v1.0</title>
    <style>
        :root { 
            /* MODO CLARO */
            --fondo: #F8E9D2;       
            --tarjeta: #EFEBE1;     
            --input_bg: #E6E0D4;    
            --texto: #4A4A4A;       
            --texto_claro: #888888; 
            --turquesa: #5FA8A3;    
            --btn_turquesa: #A2D5D2;
            --verde_balance: #62A871;
            --verde_btn: #A8DAB5;   
            --rojo_suave: #E38888;  
            --rojo_btn: #FFB7B2;    
            --naranja: #E67E22;     
            --borde_lineas: #DCD5C6;
            --azul_historial: #2980B9;
        }

        /* MODO OSCURO */
        [data-theme="dark"] {
            --fondo: #121212;
            --tarjeta: #1E1E1E;
            --input_bg: #2C2C2C;
            --texto: #E0E0E0;
            --texto_claro: #A0A0A0;
            --borde_lineas: #333333;
            --turquesa: #00acc1;
            --btn_turquesa: #006064;
            --verde_balance: #66bb6a;
            --verde_btn: #2e7d32;
            --rojo_suave: #e57373;
            --rojo_btn: #c62828;
            --naranja: #ff9800;
            --azul_historial: #5DADE2;
        }
        
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; transition: background 0.3s, color 0.3s; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        
        .tarjeta { background: var(--tarjeta); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: background 0.3s; }
        
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; color: var(--texto); transition: background 0.3s; }
        .btn-turquesa { background: var(--btn_turquesa); }
        .btn-wa { background: var(--verde_btn); }
        .btn-verde { background: var(--verde_btn); }
        .btn-rojo { background: var(--rojo_btn); color: white; }
        .btn-gris { background: var(--borde_lineas); } 
        .btn-naranja { background: var(--naranja); color: white; }
        
        .btn-calculo { background: transparent; border: 2px solid var(--naranja); color: var(--naranja); }

        .opcion-chequeo { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--borde_lineas); }
        .opcion-chequeo label { font-size: 0.8rem; font-weight: bold; color: var(--texto); flex: 1; text-align: left; }
        .check-box { width: 18px; height: 18px; accent-color: var(--turquesa); margin-right: 12px; }
        
        .input-variable { width: 100px !important; background: var(--input_bg); border: 1px solid var(--turquesa); color: var(--texto); padding: 6px !important; border-radius: 6px; text-align: right !important; font-weight: bold; font-size: 1rem !important; transition: background 0.3s, color 0.3s; }
        .input-rojo { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; }

        .monto-vuelta { font-size: 2.6rem; font-weight: bold; color: var(--turquesa); margin: 5px 0; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cuadricula label { color: var(--turquesa); font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 4px; }
        
        input[type="number"], input[type="text"] { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 12px; width: 85%; font-size: 1.5rem; text-align: center; border-radius: 8px; font-weight: bold; transition: background 0.3s, color 0.3s; }
        
        select { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; margin-top:10px; font-weight: bold; transition: background 0.3s, color 0.3s; }

        .gasto-fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid var(--borde_lineas); padding-bottom: 4px; }
        .gasto-fila label { color: var(--rojo_suave); font-size: 0.8rem; font-weight: bold; text-align: left; flex: 1; }
        .input-gasto { border-color: var(--rojo_suave) !important; color: var(--rojo_suave) !important; font-size: 1.1rem !important; padding: 6px !important; width: 110px !important; text-align: right !important; margin: 0 !important; }
        
        .fila-historial { display: flex; justify-content: space-between; padding: 10px; border-bottom: none; font-size: 0.9rem; align-items: center; }
        .monto-texto { font-weight: bold; color: var(--turquesa); }

        #contenedor-avisos { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; pointer-events: none; }
        .aviso { background: var(--verde_btn); color: var(--texto); padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 1; transition: opacity 0.5s ease; text-align: center; border: 1px solid var(--verde_balance); }

        #pantalla-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); z-index: 10000; flex-direction: column; justify-content: flex-start; padding-top: 10vh; align-items: center; text-align: center; overflow-y: auto; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--btn_turquesa); color: var(--texto); font-size: 0.9rem; font-weight: bold; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; transition: background 0.3s; }
        .toggle-tema { font-size: 1.5rem; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; }
        
        .tarjeta-dia { text-align: left; padding: 12px; border-bottom: 1px solid var(--borde_lineas); color: var(--azul_historial); }
        .tarjeta-dia:last-child { border-bottom: none; }
        .dia-fecha { font-size: 1.1rem; font-weight: bold; color: var(--azul_historial); }
        .dia-datos { font-size: 0.85rem; color: var(--azul_historial); }
        .dia-total { font-size: 1.2rem; font-weight: bold; color: var(--azul_historial); text-align: right; }
        
        .btn-chico { padding: 6px 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; background: var(--verde_btn); color: var(--texto); }
        
        .btn-basura { background: transparent; border: none; color: var(--rojo_suave); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .btn-basura:active { background: rgba(227, 136, 136, 0.2); }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="splash-screen">
        <svg viewBox="0 0 100 100" width="130" height="130">
            <path d="M 60 10 A 40 40 0 1 0 90 70 A 35 35 0 1 1 60 10" fill="#5FA8A3"/>
        </svg>
        <div style="font-size: 1.8rem; font-weight: bold; margin-top: 20px; letter-spacing: 2px; color: var(--turquesa);">LÍNEA TURQUESA</div>
        <div style="font-size: 0.9rem; color: var(--texto_claro); margin-top: 5px;">PROYECTO APOLO 11 v1.0</div>
    </div>

    <div id="pantalla-cierre">
        <div style="color: var(--rojo_suave); font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 15px;">CIERRE</div>
        <div id="cierre-vuelta" style="color: var(--turquesa); font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;"></div>
        <div id="cierre-dir" style="color: var(--texto_claro); font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 30px; text-transform: uppercase;"></div>
        <div id="cierre-monto" style="color: var(--verde_balance); font-size: 5rem; font-weight: bold;"></div>
        <div id="cierre-desglose" style="color: var(--texto_claro); font-size: 1.2rem; margin-top: 20px; line-height: 1.6; font-weight: bold;"></div>
    </div>

    <div id="contenedor-avisos"></div>

    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg viewBox="0 0 100 100" width="24" height="24">
                <path d="M 60 10 A 40 40 0 1 0 90 70 A 35 35 0 1 1 60 10" fill="#fff"/>
            </svg>
            <span style="letter-spacing: 1px;">LÍNEA TURQUESA</span>
        </div>
        <span class="toggle-tema" id="icono-tema" onclick="cambiarTema()">🌙</span>
    </div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="destino">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="total-vuelta">0</span></div>
        </div>
        
        <div class="tarjeta">
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $55</label><input type="number" class="input-variable" id="bol55" oninput="v2(this); sumar()" placeholder="0"></div>
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $50</label><input type="number" class="input-variable" id="bol50" oninput="v2(this); sumar()" placeholder="0"></div>
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $47</label><input type="number" class="input-variable" id="bol47" oninput="v2(this); sumar()" placeholder="0"></div>
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $37</label><input type="number" class="input-variable" id="bol37" oninput="v2(this); sumar()" placeholder="0"></div>
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $35</label><input type="number" class="input-variable" id="bol35" oninput="v2(this); sumar()" placeholder="0"></div>
            <div class="opcion-chequeo"><label style="color:var(--turquesa); font-size:1.1rem;">Boleto $14</label><input type="number" class="input-variable" id="bol14" oninput="v2(this); sumar()" placeholder="0"></div>
            
            <div class="opcion-chequeo" style="border-top: 1px solid var(--borde_lineas); margin-top: 10px; padding-top: 10px;">
                <label style="color: var(--turquesa); font-size: 0.9rem;">CORTESÍA</label>
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="text" id="nombre-cortesia" placeholder="Nombre" style="width: 120px; padding: 6px; border-radius: 6px; border: 1px solid var(--turquesa); background: var(--input_bg); color: var(--texto); font-size:0.9rem; text-align:center;">
                    <button class="btn-chico" onclick="agregarCortesia()">+</button>
                </div>
            </div>
            
            <div class="opcion-chequeo">
                <label style="color: var(--turquesa); font-size: 0.9rem;">EXTRA</label>
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="number" id="extra-precio" placeholder="$ Monto" style="width: 80px; padding: 6px; border-radius: 6px; border: 1px solid var(--turquesa); background: var(--input_bg); color: var(--texto); font-size:1rem; text-align:center;">
                    <input type="number" id="extra-cantidad" placeholder="# Cant" style="width: 70px; padding: 6px; border-radius: 6px; border: 1px solid var(--turquesa); background: var(--input_bg); color: var(--texto); font-size:1rem; text-align:center;">
                    <button class="btn-chico" onclick="agregarExtra()">+</button>
                </div>
            </div>
        </div>
        
        <button class="btn btn-turquesa" onclick="finalizarVuelta()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.8rem; text-transform: uppercase;">BALANCE</h2>
            <div style="color:var(--texto_claro); font-size:0.9rem;">Total Bruto: $<span id="bruto-total">0</span></div>
            <div style="color:var(--rojo_suave); font-size:0.9rem; margin-top: 5px; font-weight: bold;">Gastos Ruta: -$<span id="gastos-etiqueta">0</span></div>
            <hr style="border: 0.5px solid var(--borde_lineas); margin: 8px 0;">
            <div style="color:var(--verde_balance); font-size:1rem; font-weight: bold; text-transform: uppercase;">Total de Cuenta</div>
            <div id="neto-total" style="font-size: 2.5rem; color:var(--verde_balance); font-weight:bold;">$0</div>
        </div>

        <div id="lista-vueltas" class="tarjeta" style="padding:0; text-align:left; max-height: 120px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--rojo_suave); margin: 0 0 10px 0; font-size: 0.9rem;">GASTOS DE RUTA</h3>
            <div class="gasto-fila">
                <label>OPERACIÓN DIÉSEL ($50)</label>
                <input type="checkbox" class="check-box" id="g-opd" onchange="actualizarBalance()">
            </div>
            <div class="gasto-fila"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="actualizarBalance()" placeholder="0"></div>
            <button class="btn btn-calculo" onclick="irA('p-calc')">CALCULAR EFECTIVO ENTREGAR</button>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ REPORTE GENERAL WHATSAPP</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-naranja" style="font-size: 0.85rem;" onclick="irA('p-hist')">VER HISTORIAL</button>
            <button class="btn btn-rojo" style="font-size: 0.85rem;" onclick="borrarYGuardarDia()">CERRAR Y GUARDAR</button>
        </div>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin:0; font-size: 1.1rem; text-transform: uppercase;">Liquidación Final</h2>
            <div style="margin-top: 5px; font-weight: bold; color: var(--texto); font-size: 1.1rem;">CUENTA: $<span id="cuenta-base">0</span></div>
        </div>
        <div class="tarjeta">
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-mut" onchange="recalcularLiquidacion()"><label>MUTUALIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-seg" onchange="recalcularLiquidacion()"><label>SEGURIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-opd" onchange="recalcularLiquidacion()"><label>OPERACIÓN DIESEL ($50)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-pen" onchange="recalcularLiquidacion()"><label>PENSIÓN / COBRO ($40)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-fia" onchange="recalcularLiquidacion()"><label>FIANZA</label><input type="number" class="input-variable" id="v-fia" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-bas" onchange="recalcularLiquidacion()"><label>BASES</label><input type="number" class="input-variable" id="v-bas" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-tag" onchange="recalcularLiquidacion()"><label>TAG</label><input type="number" class="input-variable" id="v-tag" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-vdi" onchange="recalcularLiquidacion()"><label>VALE DIESEL</label><input type="number" class="input-variable" id="v-vdi" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo" style="border-top: 1px solid var(--borde_lineas); margin-top: 5px; padding-top: 5px;">
                <input type="checkbox" class="check-box" id="c-bol" onchange="recalcularLiquidacion()"><label style="color:var(--rojo_suave)">TOTAL EN BOLETOS</label><input type="number" class="input-variable input-rojo" id="v-bol" oninput="recalcularLiquidacion()" placeholder="0">
            </div>
        </div>
        <div class="tarjeta">
            <div style="color:var(--verde_balance); font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">Efectivo Entregar</div>
            <div id="final-entrega" style="font-size: 3.5rem; color:var(--verde_balance); font-weight:bold; margin-top: 5px;">$0</div>
        </div>
        <button class="btn btn-wa" style="margin-bottom: 10px;" onclick="enviarWhatsAppLiquidacion()">✅ ENVIAR POR WHATSAPP</button>
        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL BALANCE</button>
    </div>

    <div id="p-hist" class="pantalla">
        <div class="tarjeta"><h2 style="color:var(--turquesa); margin:0; font-size: 1.1rem; text-transform: uppercase;">Historial de 7 Días</h2></div>
        
        <button class="btn btn-rojo" style="margin-bottom: 10px;" onclick="borrarTodoHistorial()">BORRAR TODO EL HISTORIAL</button>
        
        <div class="tarjeta" id="contenedor-dias" style="padding: 0; background:transparent; box-shadow:none;"></div>
        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL BALANCE</button>
    </div>

    <script>
        var nVuelta = parseInt(localStorage.getItem('b_nv')) || 1;
        var historial = JSON.parse(localStorage.getItem('b_hist')) || [];
        var listaExtras = [], listaCortesias = [], brutoGlobal = 0, netoRuta = 0;

        function iniciarApp() { 
            setTimeout(function() {
                var s = document.getElementById('splash-screen');
                s.style.opacity = '0';
                setTimeout(function() { s.style.display = 'none'; }, 500);
            }, 2000);

            if(localStorage.getItem('b_theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('icono-tema').innerText = '☀️';
            }
            dibujarHistorial(); 
        }

        function v2(input) { if (input.value.length > 2) input.value = input.value.slice(0, 2); }

        function cambiarTema() {
            var actual = document.body.getAttribute('data-theme');
            if (actual === 'dark') {
                document.body.removeAttribute('data-theme');
                document.getElementById('icono-tema').innerText = '🌙';
                localStorage.setItem('b_theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('icono-tema').innerText = '☀️';
                localStorage.setItem('b_theme', 'dark');
            }
        }

        function mostrarAviso(texto) {
            var contenedor = document.getElementById('contenedor-avisos');
            var aviso = document.createElement('div');
            aviso.className = 'aviso'; aviso.innerText = texto;
            contenedor.appendChild(aviso);
            setTimeout(function() { aviso.style.opacity = '0'; }, 2500);
            setTimeout(function() { contenedor.removeChild(aviso); }, 3000);
        }

        function sumar() {
            var f = (parseInt(document.getElementById('bol55').value) || 0) * 55 + 
                    (parseInt(document.getElementById('bol50').value) || 0) * 50 + 
                    (parseInt(document.getElementById('bol47').value) || 0) * 47 + 
                    (parseInt(document.getElementById('bol37').value) || 0) * 37 + 
                    (parseInt(document.getElementById('bol35').value) || 0) * 35 + 
                    (parseInt(document.getElementById('bol14').value) || 0) * 14;
            var e = 0; listaExtras.forEach(function(x){ e += (x.p * x.c); });
            document.getElementById('total-vuelta').innerText = (f + e);
        }

        function agregarExtra() {
            var p = parseFloat(document.getElementById('extra-precio').value) || 0;
            var c = parseInt(document.getElementById('extra-cantidad').value) || 0;
            if (p > 0 && c > 0) { 
                listaExtras.push({p: p, c: c}); sumar(); 
                var msj = c === 1 ? "Se agregó 1 pasajero de $" + p : "Se agregaron " + c + " pasajeros de $" + p;
                mostrarAviso(msj);
                document.getElementById('extra-precio').value = ""; document.getElementById('extra-cantidad').value = ""; 
            }
        }

        function agregarCortesia() {
            var n = document.getElementById('nombre-cortesia').value.trim();
            if (n !== "") { 
                var nomMayus = n.toUpperCase();
                listaCortesias.push(nomMayus); 
                mostrarAviso("Se agregó la cortesía " + nomMayus);
                document.getElementById('nombre-cortesia').value = ""; 
            }
        }

        // FUNCION PARA GENERAR EL TEXTO DEL DESGLOSE (Para pantalla de cierre, libro e historial)
        function generarTextoDesglose(det) {
            if (!det) return "Sin detalle guardado";
            var txt = [];
            if (det.b55 > 0) txt.push(det.b55 + " de $55");
            if (det.b50 > 0) txt.push(det.b50 + " de $50");
            if (det.b47 > 0) txt.push(det.b47 + " de $47");
            if (det.b37 > 0) txt.push(det.b37 + " de $37");
            if (det.b35 > 0) txt.push(det.b35 + " de $35");
            if (det.b14 > 0) txt.push(det.b14 + " de $14");
            if (det.ext && det.ext.length > 0) {
                det.ext.forEach(function(e) { txt.push(e.c + " extra(s) de $" + e.p); });
            }
            if (det.cor && det.cor.length > 0) {
                txt.push(det.cor.length + " Cortesía(s)");
            }
            return txt.length > 0 ? txt.join('<br>') : "Vuelta Vacía";
        }

        function finalizarVuelta() {
            var m = parseInt(document.getElementById('total-vuelta').innerText) || 0;
            var d = document.getElementById('destino').value;
            
            var b55 = parseInt(document.getElementById('bol55').value) || 0;
            var b50 = parseInt(document.getElementById('bol50').value) || 0;
            var b47 = parseInt(document.getElementById('bol47').value) || 0;
            var b37 = parseInt(document.getElementById('bol37').value) || 0;
            var b35 = parseInt(document.getElementById('bol35').value) || 0;
            var b14 = parseInt(document.getElementById('bol14').value) || 0;
            
            var tPas = b55 + b50 + b47 + b37 + b35 + b14 + listaCortesias.length;
            listaExtras.forEach(function(e) { tPas += e.c; });
            
            if (m === 0 && tPas === 0) {
                if (!confirm("¿Está seguro de cerrar esta vuelta vacía?")) return;
            }

            var detalleObj = { b55: b55, b50: b50, b47: b47, b37: b37, b35: b35, b14: b14, ext: [...listaExtras], cor: [...listaCortesias] };

            document.getElementById('cierre-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            document.getElementById('cierre-dir').innerText = d;
            document.getElementById('cierre-monto').innerText = "$" + m;
            
            // SE IMPRIME EL DESGLOSE EN LA PANTALLA DE CIERRE
            document.getElementById('cierre-desglose').innerHTML = generarTextoDesglose(detalleObj);
            
            document.getElementById('pantalla-cierre').style.display = 'flex';
            
            historial.push({ n: nVuelta, d: d, m: m, p: tPas, det: detalleObj });
            localStorage.setItem('b_hist', JSON.stringify(historial));
            nVuelta++; localStorage.setItem('b_nv', nVuelta);
            
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            listaExtras = []; 
            listaCortesias = []; 
            sumar(); 

            setTimeout(function() {
                document.getElementById('pantalla-cierre').style.display = 'none';
                irA('p-lib');
            }, 3000); // Le di 1 seg extra para que puedan leer el desglose
        }

        function actualizarBalance() {
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + 
                    (parseFloat(document.getElementById('g-caseta').value) || 0) + 
                    (parseFloat(document.getElementById('g-despachadores').value) || 0) + 
                    (parseFloat(document.getElementById('g-pension').value) || 0) + 
                    (parseFloat(document.getElementById('g-sueldo').value) || 0);
            
            if(document.getElementById('g-opd').checked) g += 50;

            netoRuta = brutoGlobal - g;
            document.getElementById('gastos-etiqueta').innerText = g;
            document.getElementById('neto-total').innerText = "$" + netoRuta;
            document.getElementById('cuenta-base').innerText = netoRuta;
            recalcularLiquidacion();
        }

        function recalcularLiquidacion() {
            var ajuste = 0;
            if(document.getElementById('c-mut').checked) ajuste += 20;
            if(document.getElementById('c-seg').checked) ajuste += 20;
            if(document.getElementById('c-opd').checked) ajuste += 50;
            if(document.getElementById('c-pen').checked) ajuste += 40;
            
            var fia = parseFloat(document.getElementById('v-fia').value) || 0;
            if(document.getElementById('c-fia').checked) ajuste += fia;
            
            var bas = parseFloat(document.getElementById('v-bas').value) || 0;
            if(document.getElementById('c-bas').checked) ajuste += bas;
            
            var tag = parseFloat(document.getElementById('v-tag').value) || 0;
            if(document.getElementById('c-tag').checked) ajuste += tag;
            
            var vdi = parseFloat(document.getElementById('v-vdi').value) || 0;
            if(document.getElementById('c-vdi').checked) ajuste += vdi;
            
            var restaBoletos = 0;
            if(document.getElementById('c-bol').checked) restaBoletos = (parseFloat(document.getElementById('v-bol').value) || 0);
            
            document.getElementById('final-entrega').innerText = "$" + (netoRuta + ajuste - restaBoletos);
        }

        function dibujarHistorial() {
            document.getElementById('titulo-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            var h = ""; brutoGlobal = 0;
            historial.forEach(function(v, index) {
                h += '<div style="border-bottom: 1px solid var(--borde_lineas); padding: 10px 0;">';
                h += '<div class="fila-historial" style="padding: 0;">';
                h += '<span><b>' + v.n + 'ª</b> ' + v.d + '</span>';
                h += '<div style="display:flex; align-items:center; gap:10px;">';
                h += '<span class="monto-texto">' + v.p + ' Pax - $' + v.m + '</span>';
                // ICONO DE LUPA
                h += '<span onclick="document.getElementById(\'det-v-'+index+'\').style.display = document.getElementById(\'det-v-'+index+'\').style.display === \'none\' ? \'block\' : \'none\'" style="cursor:pointer;"><svg viewBox="0 0 24 24" width="20" height="20" fill="var(--turquesa)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 12.01 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 12.01 14 9.5 14z"/></svg></span>';
                h += '</div></div>';
                // CAJA DE DESGLOSE OCULTA
                h += '<div id="det-v-'+index+'" style="display:none; text-align:left; font-size:0.85rem; color:var(--texto_claro); margin-top:8px;">' + generarTextoDesglose(v.det) + '</div>';
                h += '</div>';
                brutoGlobal += v.m;
            });
            document.getElementById('lista-vueltas').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin vueltas</p>";
            document.getElementById('bruto-total').innerText = brutoGlobal;
            actualizarBalance();
        }

        function dibujarHistorialDias() {
            var histDias = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
            var html = "";
            if (histDias.length === 0) {
                html = "<p style='padding:15px; color:var(--texto_claro);'>No hay días guardados aún.</p>";
            } else {
                for(var i = histDias.length - 1; i >= 0; i--) {
                    var d = histDias[i];
                    html += '<div class="tarjeta" style="text-align: left; padding: 12px; margin-bottom: 10px;">';
                    html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">';
                    html += '<div class="dia-fecha" style="display:flex; align-items:center; gap:8px;">' + d.f;
                    // LUPA DEL HISTORIAL
                    html += '<span onclick="document.getElementById(\'det-dia-'+i+'\').style.display = document.getElementById(\'det-dia-'+i+'\').style.display === \'none\' ? \'block\' : \'none\'" style="cursor:pointer;"><svg viewBox="0 0 24 24" width="20" height="20" fill="var(--turquesa)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 12.01 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 12.01 14 9.5 14z"/></svg></span>';
                    html += '</div>';
                    // BOTE DE BASURA ROJO
                    html += '<button class="btn-basura" onclick="borrarDiaIndividual(' + i + ')"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>';
                    html += '</div>';
                    
                    html += '<div style="display:flex; justify-content:space-between; align-items:center;">';
                    html += '<div class="dia-datos">' + d.pax + ' Pax | Bruto: $' + d.b + '<br>Gastos: -$' + d.g + '</div>';
                    html += '<div class="dia-total">$' + d.n + '</div>';
                    html += '</div>';
                    
                    // DESGLOSE DE TODAS LAS VUELTAS DE ESE DÍA
                    html += '<div id="det-dia-'+i+'" style="display:none; margin-top:12px; padding-top:10px; border-top:1px dashed var(--borde_lineas); font-size:0.85rem; color:var(--texto_claro);">';
                    if(d.vueltas && d.vueltas.length > 0) {
                        d.vueltas.forEach(function(vu) {
                            html += '<div style="margin-bottom:10px;"><b>' + vu.n + 'ª ' + vu.d + ' ($' + vu.m + '):</b><br>' + generarTextoDesglose(vu.det) + '</div>';
                        });
                    } else {
                        html += '<i>Detalle no disponible para esta cuenta antigua.</i>';
                    }
                    html += '</div>';
                    html += '</div>';
                }
            }
            document.getElementById('contenedor-dias').innerHTML = html;
        }

        // FUNCIÓN BORRAR DÍA INDIVIDUAL
        function borrarDiaIndividual(index) {
            if(confirm("¿Estás seguro de que deseas borrar esta cuenta del historial?")) {
                var histDias = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
                histDias.splice(index, 1);
                localStorage.setItem('b_hist_dias', JSON.stringify(histDias));
                dibujarHistorialDias();
            }
        }

        // FUNCIÓN BORRAR TODO EL HISTORIAL
        function borrarTodoHistorial() {
            var histDias = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
            if(histDias.length === 0) return alert("El historial ya está vacío.");
            
            if(confirm("ATENCIÓN: ¿Estás seguro de borrar TODO el historial? Esto no se puede deshacer.")) {
                localStorage.removeItem('b_hist_dias');
                dibujarHistorialDias();
            }
        }

        function irA(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-lib') dibujarHistorial();
            if(id === 'p-hist') dibujarHistorialDias();
        }

        function borrarYGuardarDia() { 
            if (historial.length === 0) {
                alert("No hay datos para guardar.");
                return;
            }
            if (confirm("¿Terminar el día?\nEsto guardará tu resumen en el historial y limpiará la cuenta para empezar mañana.")) { 
                var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + 
                        (parseFloat(document.getElementById('g-caseta').value) || 0) + 
                        (parseFloat(document.getElementById('g-despachadores').value) || 0) + 
                        (parseFloat(document.getElementById('g-pension').value) || 0) + 
                        (parseFloat(document.getElementById('g-sueldo').value) || 0);
                if(document.getElementById('g-opd').checked) g += 50;

                var totalCuenta = brutoGlobal - g;
                var tPas = 0;
                historial.forEach(function(v){ tPas += v.p; });

                var fechaActual = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
                
                var histDias = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
                // SE GUARDA EL HISTORIAL DE VUELTAS COMPLETO AQUÍ PARA PODER VERLO DESPUÉS
                histDias.push({ f: fechaActual, pax: tPas, b: brutoGlobal, g: g, n: totalCuenta, vueltas: [...historial] });
                
                if (histDias.length > 7) histDias.shift();

                var temaActual = localStorage.getItem('b_theme');
                localStorage.clear(); 
                
                if (temaActual) localStorage.setItem('b_theme', temaActual);
                localStorage.setItem('b_hist_dias', JSON.stringify(histDias));
                
                location.reload(); 
            } 
        }

        function enviarWhatsApp() {
            if (historial.length === 0) return alert("No hay datos registrados.");
            
            var d_diesel = parseFloat(document.getElementById('g-diesel').value) || 0;
            var d_caseta = parseFloat(document.getElementById('g-caseta').value) || 0;
            var d_desp = parseFloat(document.getElementById('g-despachadores').value) || 0;
            var d_pen = parseFloat(document.getElementById('g-pension').value) || 0;
            var d_sue = parseFloat(document.getElementById('g-sueldo').value) || 0;
            var d_opd = document.getElementById('g-opd').checked ? 50 : 0;
            
            var totalGastos = d_diesel + d_caseta + d_desp + d_pen + d_sue + d_opd;

            var mensaje = "*REPORTE DE CUENTA COMPLETO*%0A";
            mensaje += "----------------------------%0A";
            
            historial.forEach(function(v) {
                mensaje += "*"+ v.n + "ª " + v.d + "*%0A";
                if(v.det.b55 > 0) mensaje += "• " + v.det.b55 + " de $55%0A";
                if(v.det.b50 && v.det.b50 > 0) mensaje += "• " + v.det.b50 + " de $50%0A";
                if(v.det.b47 > 0) mensaje += "• " + v.det.b47 + " de $47%0A";
                if(v.det.b37 > 0) mensaje += "• " + v.det.b37 + " de $37%0A";
                if(v.det.b35 && v.det.b35 > 0) mensaje += "• " + v.det.b35 + " de $35%0A";
                if(v.det.b14 > 0) mensaje += "• " + v.det.b14 + " de $14%0A";
                
                if(v.det.ext && v.det.ext.length > 0) {
                    v.det.ext.forEach(function(e) { mensaje += "• " + e.c + " de $" + e.p + " (Extra)%0A"; });
                }
                if(v.det.cor && v.det.cor.length > 0) {
                    v.det.cor.forEach(function(c) { mensaje += "• Cortesía: " + c + "%0A"; });
                }
                mensaje += "Pasajeros: " + v.p + " | Subtotal: $" + v.m + "%0A%0A";
            });
            
            if (totalGastos > 0) {
                mensaje += "----------------------------%0A";
                mensaje += "*GASTOS DE RUTA*%0A";
                if(d_opd > 0) mensaje += "• Operación Diésel: $" + d_opd + "%0A";
                if(d_diesel > 0) mensaje += "• Diesel: $" + d_diesel + "%0A";
                if(d_caseta > 0) mensaje += "• Caseta: $" + d_caseta + "%0A";
                if(d_desp > 0) mensaje += "• Despachadores: $" + d_desp + "%0A";
                if(d_pen > 0) mensaje += "• Pensión: $" + d_pen + "%0A";
                if(d_sue > 0) mensaje += "• Sueldo: $" + d_sue + "%0A";
            }
            
            var totalCuenta = brutoGlobal - totalGastos;
            
            mensaje += "----------------------------%0A";
            mensaje += "*BALANCE FINAL*%0A";
            mensaje += "TOTAL EN BRUTO: $" + brutoGlobal + "%0A";
            mensaje += "TOTAL DE GASTOS: -$" + totalGastos + "%0A";
            mensaje += "----------------------------%0A";
            mensaje += "*TOTAL DE CUENTA: $" + totalCuenta + "*";
            
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }

        function enviarWhatsAppLiquidacion() {
            var ajuste = 0;
            var mensaje = "*BALANCE DE EFECTIVO*%0A";
            mensaje += "----------------------------%0A";
            mensaje += "Cuenta: *$" + netoRuta + "*%0A";
            mensaje += "----------------------------%0A";
            
            if(document.getElementById('c-mut').checked) { ajuste += 20; mensaje += "• Mutualidad: +$20%0A"; }
            if(document.getElementById('c-seg').checked) { ajuste += 20; mensaje += "• Seguridad: +$20%0A"; }
            if(document.getElementById('c-opd').checked) { ajuste += 50; mensaje += "• Operación Diesel: +$50%0A"; }
            if(document.getElementById('c-pen').checked) { ajuste += 40; mensaje += "• Pensión/Cobro: +$40%0A"; }
            
            var fia = parseFloat(document.getElementById('v-fia').value) || 0;
            if(document.getElementById('c-fia').checked && fia > 0) { ajuste += fia; mensaje += "• Fianza: +$" + fia + "%0A"; }
            
            var bas = parseFloat(document.getElementById('v-bas').value) || 0;
            if(document.getElementById('c-bas').checked && bas > 0) { ajuste += bas; mensaje += "• Bases: +$" + bas + "%0A"; }
            
            var tag = parseFloat(document.getElementById('v-tag').value) || 0;
            if(document.getElementById('c-tag').checked && tag > 0) { ajuste += tag; mensaje += "• TAG: +$" + tag + "%0A"; }
            
            var vdi = parseFloat(document.getElementById('v-vdi').value) || 0;
            if(document.getElementById('c-vdi').checked && vdi > 0) { ajuste += vdi; mensaje += "• Vale Diesel: +$" + vdi + "%0A"; }
            
            var restaBoletos = 0;
            var bol = parseFloat(document.getElementById('v-bol').value) || 0;
            if(document.getElementById('c-bol').checked && bol > 0) { 
                restaBoletos = bol; 
                mensaje += "----------------------------%0A";
                mensaje += "• Boletos entregados: -$" + bol + "%0A"; 
            }
            
            var entregar = netoRuta + ajuste - restaBoletos;
            
            mensaje += "----------------------------%0A";
            mensaje += "*EFECTIVO A ENTREGAR: $" + entregar + "*";
            
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
