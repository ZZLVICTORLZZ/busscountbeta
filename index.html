<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Línea Turquesa - Apolo 11</title>
    <style>
        :root { 
            --fondo: #F8E9D2; --tarjeta: #EFEBE1; --input_bg: #E6E0D4; --texto: #4A4A4A; 
            --texto_claro: #888888; --turquesa: #5FA8A3; --btn_turquesa: #A2D5D2;
            --verde_balance: #62A871; --verde_btn: #A8DAB5; --rojo_suave: #E38888; 
            --rojo_btn: #FFB7B2; --naranja: #E67E22; --borde_lineas: #DCD5C6; 
        }
        [data-theme="dark"] {
            --fondo: #121212; --tarjeta: #1E1E1E; --input_bg: #2C2C2C; --texto: #E0E0E0;
            --texto_claro: #A0A0A0; --borde_lineas: #333333; --turquesa: #00acc1;
            --btn_turquesa: #006064; --verde_balance: #66bb6a; --verde_btn: #2e7d32;
            --rojo_suave: #e57373; --rojo_btn: #c62828; --naranja: #D35400;
        }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; transition: background 0.3s, color 0.3s; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--tarjeta); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: background 0.3s; }
        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; cursor: pointer; color: var(--texto); transition: 0.3s; }
        .btn-turquesa { background: var(--btn_turquesa); }
        .btn-wa { background: var(--verde_btn); }
        .btn-verde { background: var(--verde_btn); }
        .btn-rojo { background: var(--rojo_btn); }
        .btn-gris { background: var(--borde_lineas); } 
        .btn-naranja { background: var(--naranja); color: white; }
        .btn-calculo { background: transparent; border: 2px solid var(--naranja); color: var(--naranja); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--btn_turquesa); color: var(--texto); font-size: 0.9rem; font-weight: bold; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; }
        input[type="number"], input[type="text"] { background: var(--input_bg); color: var(--texto); border: 1px solid var(--turquesa); padding: 12px; width: 85%; font-size: 1.5rem; text-align: center; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .cuadricula { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opcion-chequeo { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--borde_lineas); }
        .input-variable { width: 70px !important; background: var(--input_bg); border: 1px solid var(--turquesa); color: var(--texto); padding: 6px !important; border-radius: 6px; text-align: right !important; font-weight: bold; font-size: 1rem !important; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease; }
        #pantalla-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--fondo); z-index: 10000; flex-direction: column; justify-content: flex-start; padding-top: 15vh; align-items: center; text-align: center; }
        .fila-historial { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--borde_lineas); font-size: 0.9rem; align-items: center; }
        .monto-texto { font-weight: bold; color: var(--turquesa); }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="splash-screen">
        <svg viewBox="0 0 200 120" width="220">
            <path d="M40 85 Q 110 15 190 65" fill="none" stroke="#5FA8A3" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
            <path d="M30 95 Q 100 25 180 75" fill="none" stroke="#888" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
            <path d="M45 75 L115 62 M120 64 L50 77" stroke="#000" stroke-width="5" fill="black"/>
            <path d="M90 66 Q 100 35 110 64 L100 85 Z" fill="black"/>
            <circle cx="110" cy="55" r="5" fill="black"/>
        </svg>
        <div style="font-size: 1.8rem; font-weight: bold; margin-top: 10px; letter-spacing: 2px; color: #5FA8A3;">LÍNEA TURQUESA</div>
        <div style="font-size: 0.8rem; color: var(--texto_claro); margin-top: 5px; opacity: 0.8;">PROYECTO APOLO 11 v1.0</div>
    </div>

    <div id="pantalla-cierre">
        <div style="color: var(--rojo_suave); font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 15px;">CIERRE</div>
        <div id="cierre-vuelta" style="color: var(--turquesa); font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;"></div>
        <div id="cierre-dir" style="color: var(--texto_claro); font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 40px; text-transform: uppercase;"></div>
        <div id="cierre-monto" style="color: var(--verde_balance); font-size: 5rem; font-weight: bold;"></div>
    </div>

    <div id="contenedor-avisos"></div>

    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg viewBox="0 0 100 100" width="24" height="24">
                <path d="M 60 10 A 40 40 0 1 0 90 70 A 35 35 0 1 1 60 10" fill="#fff"/>
            </svg>
            <span style="letter-spacing: 1px;">LÍNEA TURQUESA</span>
        </div>
        <span class="toggle-tema" id="icono-tema" onclick="cambiarTema()">🌙</span>
    </div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="titulo-vuelta" style="color:var(--turquesa); margin:0; font-size: 1.3rem;">1ª MEDIA VUELTA</h2>
            <select id="destino">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div class="monto-vuelta">$<span id="total-vuelta">0</span></div>
        </div>
        <div class="tarjeta">
            <div class="cuadricula">
                <div><label>$14</label><input type="number" id="bol14" oninput="v2(this); sumar();"></div>
                <div><label>$55</label><input type="number" id="bol55" oninput="v2(this); sumar();"></div>
                <div><label>$47</label><input type="number" id="bol47" oninput="v2(this); sumar();"></div>
                <div><label>$37</label><input type="number" id="bol37" oninput="v2(this); sumar();"></div>
            </div>
            <div style="margin-top:10px; border-top: 1px solid var(--borde_lineas); padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">CORTESÍAS</label>
                <input type="text" id="nombre-cortesia" placeholder="NOMBRE" style="width: 80%; font-size: 1.2rem; margin-top: 5px;">
                <button class="btn btn-verde" style="padding: 10px;" onclick="agregarCortesia()">+ AGREGAR CORTESÍA</button>
            </div>
            <div style="margin-top:10px; border-top: 1px solid var(--borde_lineas); padding-top:10px;">
                <label style="color: var(--turquesa); font-size: 0.8rem; font-weight: bold;">EXTRA</label>
                <div class="cuadricula" style="margin-top:5px;">
                    <input type="number" id="extra-precio" placeholder="$">
                    <input type="number" id="extra-cantidad" placeholder="#">
                </div>
                <button class="btn btn-verde" style="padding: 10px;" onclick="agregarExtra()">+ AGREGAR EXTRA</button>
            </div>
        </div>
        <button class="btn btn-turquesa" onclick="finalizarVuelta()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--turquesa); margin-bottom:10px; font-size: 1.8rem; text-transform: uppercase;">BALANCE</h2>
            <div style="color:var(--texto_claro); font-size:0.9rem;">Total Bruto: $<span id="bruto-total">0</span></div>
            <div style="color:var(--rojo_suave); font-size:0.9rem; margin-top: 5px; font-weight: bold;">Gastos Ruta: -$<span id="gastos-etiqueta">0</span></div>
            <hr style="border: 0.5px solid var(--borde_lineas); margin: 8px 0;">
            <div style="color:var(--verde_balance); font-size:1rem; font-weight: bold; text-transform: uppercase;">Total de Cuenta</div>
            <div id="neto-total" style="font-size: 2.5rem; color:var(--verde_balance); font-weight:bold;">$0</div>
        </div>

        <div id="lista-vueltas" class="tarjeta" style="padding:0; text-align:left; max-height: 120px; overflow-y: auto;"></div>

        <div class="tarjeta">
            <h3 style="color: var(--rojo_suave); margin: 0 0 10px 0; font-size: 0.9rem;">GASTOS DE RUTA</h3>
            <div class="gasto-fila"><label>DIESEL</label><input type="number" class="input-gasto" id="g-diesel" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>CASETA</label><input type="number" class="input-gasto" id="g-caseta" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>DESPACHADORES</label><input type="number" class="input-gasto" id="g-despachadores" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>PENSIÓN</label><input type="number" class="input-gasto" id="g-pension" oninput="actualizarBalance()" placeholder="0"></div>
            <div class="gasto-fila"><label>SUELDO</label><input type="number" class="input-gasto" id="g-sueldo" oninput="actualizarBalance()" placeholder="0"></div>
            <button class="btn btn-calculo" onclick="irA('p-calc')">CALCULAR EFECTIVO ENTREGAR</button>
        </div>
        
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ REPORTE GENERAL WHATSAPP</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-naranja" style="font-size: 0.85rem;" onclick="irA('p-hist')">VER HISTORIAL</button>
            <button class="btn btn-rojo" style="font-size: 0.85rem;" onclick="borrarYGuardarDia()">CERRAR Y GUARDAR</button>
        </div>
    </div>

    <div id="p-calc" class="pantalla">
        <div class="tarjeta"><h3>Liquidación Final</h3></div>
        <div class="tarjeta">
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-mut" onchange="recalcularLiquidacion()"><label>MUTUALIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-seg" onchange="recalcularLiquidacion()"><label>SEGURIDAD ($20)</label></div>
            <div class="opcion-chequeo"><input type="checkbox" class="check-box" id="c-fia" onchange="recalcularLiquidacion()"><label>FIANZA</label><input type="number" class="input-variable" id="v-fia" oninput="recalcularLiquidacion()" placeholder="0"></div>
            <div class="opcion-chequeo" style="border-top: 1px solid var(--borde_lineas); margin-top: 5px; padding-top: 5px;">
                <input type="checkbox" class="check-box" id="c-bol" onchange="recalcularLiquidacion()">
                <label style="color:var(--rojo_suave)">TOTAL EN BOLETOS</label>
                <input type="number" class="input-variable input-rojo" id="v-bol" oninput="recalcularLiquidacion()" placeholder="0">
            </div>
        </div>
        <div class="tarjeta">
            <div style="color:var(--verde_balance); font-size: 0.9rem; font-weight: bold;">Efectivo Entregar</div>
            <div id="final-entrega" style="font-size: 3.5rem; color:var(--verde_balance); font-weight:bold;">$0</div>
        </div>
        <button class="btn btn-wa" onclick="enviarWhatsAppLiquidacion()">✅ ENVIAR POR WHATSAPP</button>
        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL BALANCE</button>
    </div>

    <div id="p-hist" class="pantalla">
        <div class="tarjeta"><h2>Historial de 7 Días</h2></div>
        <div class="tarjeta" id="contenedor-dias" style="padding: 0;"></div>
        <button class="btn btn-turquesa" onclick="irA('p-lib')">REGRESAR AL BALANCE</button>
    </div>

    <script>
        var nVuelta = parseInt(localStorage.getItem('b_nv')) || 1;
        var historial = JSON.parse(localStorage.getItem('b_hist')) || [];
        var listaExtras = [], listaCortesias = [], brutoGlobal = 0, netoRuta = 0;

        function iniciarApp() { 
            setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500); }, 2000);
            if(localStorage.getItem('b_theme') === 'dark') { document.body.setAttribute('data-theme', 'dark'); document.getElementById('icono-tema').innerText = '☀️'; }
            dibujarHistorial(); 
        }

        // VALIDACIÓN DE 2 CIFRAS
        function v2(i) { if(i.value.length > 2) i.value = i.value.slice(0, 2); }

        function sumar() {
            var f = (parseInt(document.getElementById('bol14').value) || 0) * 14 + 
                    (parseInt(document.getElementById('bol55').value) || 0) * 55 + 
                    (parseInt(document.getElementById('bol47').value) || 0) * 47 + 
                    (parseInt(document.getElementById('bol37').value) || 0) * 37;
            var e = 0; listaExtras.forEach(function(x){ e += (x.p * x.c); });
            document.getElementById('total-vuelta').innerText = (f + e);
        }

        function agregarExtra() {
            var p = parseFloat(document.getElementById('extra-precio').value) || 0;
            var c = parseInt(document.getElementById('extra-cantidad').value) || 0;
            if (p > 0 && c > 0) { listaExtras.push({p: p, c: c}); sumar(); mostrarAviso("Agregado pasajero extra"); document.getElementById('extra-precio').value = ""; document.getElementById('extra-cantidad').value = ""; }
        }

        function agregarCortesia() {
            var n = document.getElementById('nombre-cortesia').value.trim();
            if (n !== "") { listaCortesias.push(n.toUpperCase()); mostrarAviso("Cortesía de " + n); document.getElementById('nombre-cortesia').value = ""; }
        }

        function finalizarVuelta() {
            var m = parseInt(document.getElementById('total-vuelta').innerText) || 0;
            var d = document.getElementById('destino').value;
            var b14 = parseInt(document.getElementById('bol14').value) || 0, b55 = parseInt(document.getElementById('bol55').value) || 0, b47 = parseInt(document.getElementById('bol47').value) || 0, b37 = parseInt(document.getElementById('bol37').value) || 0;
            var tPas = b14 + b55 + b47 + b37 + listaCortesias.length;
            listaExtras.forEach(e => tPas += e.c);
            
            document.getElementById('cierre-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            document.getElementById('cierre-dir').innerText = d;
            document.getElementById('cierre-monto').innerText = "$" + m;
            document.getElementById('pantalla-cierre').style.display = 'flex';
            
            historial.push({ n: nVuelta, d: d, m: m, p: tPas, det: { b14: b14, b55: b55, b47: b47, b37: b37, ext: [...listaExtras], cor: [...listaCortesias] } });
            localStorage.setItem('b_hist', JSON.stringify(historial));
            nVuelta++; localStorage.setItem('b_nv', nVuelta);
            
            document.querySelectorAll('#p-reg input').forEach(i => i.value="");
            listaExtras = []; listaCortesias = []; sumar(); 
            setTimeout(() => { document.getElementById('pantalla-cierre').style.display = 'none'; irA('p-lib'); }, 2000);
        }

        function actualizarBalance() {
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + (parseFloat(document.getElementById('g-caseta').value) || 0) + (parseFloat(document.getElementById('g-despachadores').value) || 0) + (parseFloat(document.getElementById('g-pension').value) || 0) + (parseFloat(document.getElementById('g-sueldo').value) || 0);
            netoRuta = brutoGlobal - g;
            document.getElementById('gastos-etiqueta').innerText = g;
            document.getElementById('neto-total').innerText = "$" + netoRuta;
            recalcularLiquidacion();
        }

        function recalcularLiquidacion() {
            var a = 0;
            if(document.getElementById('c-mut').checked) a += 20;
            if(document.getElementById('c-seg').checked) a += 20;
            a += (parseFloat(document.getElementById('v-fia').value) || 0);
            var b = (document.getElementById('c-bol').checked) ? (parseFloat(document.getElementById('v-bol').value) || 0) : 0;
            document.getElementById('final-entrega').innerText = "$" + (netoRuta + a - b);
        }

        function dibujarHistorial() {
            document.getElementById('titulo-vuelta').innerText = nVuelta + "ª MEDIA VUELTA";
            var h = ""; brutoGlobal = 0;
            historial.forEach(v => { h += `<div class="fila-historial"><span><b>${v.n}ª</b> ${v.d}</span><span class="monto-texto">${v.p} pax - $${v.m}</span></div>`; brutoGlobal += v.m; });
            document.getElementById('lista-vueltas').innerHTML = h || "<p style='padding:15px;'>Sin vueltas</p>";
            document.getElementById('bruto-total').innerText = brutoGlobal;
            actualizarBalance();
        }

        function dibujarHistorialDias() {
            var hd = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
            document.getElementById('contenedor-dias').innerHTML = hd.slice().reverse().map(d => `<div class="tarjeta-dia"><div class="dia-fecha">${d.f}</div><div style="display:flex;justify-content:space-between;"><div>${d.pax} Pax</div><div class="dia-total">$${d.n}</div></div></div>`).join('') || "<p style='padding:15px;'>Vacío</p>";
        }

        function irA(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-lib') dibujarHistorial();
            if(id === 'p-hist') dibujarHistorialDias();
        }

        function borrarYGuardarDia() { 
            if (!historial.length || !confirm("¿Cerrar y guardar día?")) return;
            var g = (parseFloat(document.getElementById('g-diesel').value) || 0) + (parseFloat(document.getElementById('g-caseta').value) || 0) + (parseFloat(document.getElementById('g-despachadores').value) || 0) + (parseFloat(document.getElementById('g-pension').value) || 0) + (parseFloat(document.getElementById('g-sueldo').value) || 0);
            var tPas = 0; historial.forEach(v => tPas += v.p);
            var hd = JSON.parse(localStorage.getItem('b_hist_dias')) || [];
            hd.push({ f: new Date().toLocaleDateString(), pax: tPas, b: brutoGlobal, g: g, n: (brutoGlobal - g) });
            if (hd.length > 7) hd.shift();
            var theme = localStorage.getItem('b_theme');
            localStorage.clear(); 
            if (theme) localStorage.setItem('b_theme', theme);
            localStorage.setItem('b_hist_dias', JSON.stringify(hd));
            location.reload(); 
        }

        function cambiarTema() {
            var b = document.body;
            if (b.getAttribute('data-theme') === 'dark') { b.removeAttribute('data-theme'); localStorage.setItem('b_theme', 'light'); document.getElementById('icono-tema').innerText = '🌙'; }
            else { b.setAttribute('data-theme', 'dark'); localStorage.setItem('b_theme', 'dark'); document.getElementById('icono-tema').innerText = '☀️'; }
        }

        function mostrarAviso(t) {
            var c = document.getElementById('contenedor-avisos');
            var a = document.createElement('div'); a.className = 'aviso'; a.innerText = t;
            c.appendChild(a); setTimeout(() => a.style.opacity = '0', 2000); setTimeout(() => c.removeChild(a), 2500);
        }

        function enviarWhatsApp() {
            var m = "*REPORTE LÍNEA TURQUESA*%0A";
            historial.forEach(v => m += `*${v.n}ª ${v.d}:* $${v.m}%0A`);
            m += `%0A*TOTAL CUENTA: $${document.getElementById('neto-total').innerText}*`;
            window.open("https://wa.me/?text=" + m, "_blank");
        }

        function enviarWhatsAppLiquidacion() {
            window.open("https://wa.me/?text=*LIQUIDACIÓN FINAL APOLO 11*%0A*ENTREGAR: " + document.getElementById('final-entrega').innerText + "*", "_blank");
        }
    </script>
</body>
</html>
